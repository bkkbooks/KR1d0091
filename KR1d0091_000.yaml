body:
  text: 朱子禮纂禮類六雜禮書之屬提要臣等謹案朱子禮纂五卷國朝李光地撰是書於朱子儀禮經傳通解及家禮二書外凡説禮之條散見於文集語類者分類纂集分為五目曰總論曰冠昏曰喪曰祭曰雜儀縷析條分具有統貫雖採輯不無遺闕若文集有答潘恭叔書論編儀禮禮記章句答王子合書論居喪家祭又有周禮三德説樂記動靜説書程子禘説後等篇此書皆不見録又與吳晦叔書論太廟當南向太祖當東向雖與此書所録答王子合書大義相似然答晦叔書更為詳盡今乃刪詳而存略又集載鄂州社壇記前列羅鄂州所定壇壝制度及社稷向位朱子必以其深合典禮故詳述之以補禮文之闕而此書乃盡刪前篇但存某按以下云云亦失朱子備載之意然朱子説禮之言參差散見猝不能得其端緒光地類聚而區分之使秩然有理於學禮者亦為有功矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1bf83e98e1079135432c699c9074ae74bf76e17c4beb721d43d099985e286977
