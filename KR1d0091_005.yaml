body:
  text: 朱子禮纂卷五大學士李光地撰雜儀天子之禮至尊無上其居處則內有六寢六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領於冢宰其冕辨車旗宗祝巫史卜筮瞽侑之官皆領於宗伯有師以道之教訓有傅以傅其德義有保以保其身體有師氏以媺詔之媺下本有訓字有保氏以諫其惡前有凝後有丞左有輔右有弼其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧在輿有旅賁之規旅賁勇士掌執戈楯夾車而趨位寧有官師之典門屏之間謂之寧倚几有訓誦之諫工師所誦之諫書之於几也居寢有􅉏御之針􅉏近也臨事有瞽史之道宴居有工師之誦史為書大史君舉則書瞽為詩工又誦針諫大夫規誨士傳言庶人謗商旅於市旅陳也陳貨物以示時所貴尚百工獻藝獻其技藝以喻政事動則左史書之言則右史書之其書春秋尚書有存者御瞽幾聲之上下幾猶察也察其存樂不幸而至於有過則又有爭臣七人面列廷爭以正救之蓋所以養之之備至於如此是以恭已南面中心無為以守至正而貌之恭足以作肅言之從足以作乂視之明足以作哲聽之聰足以作謀思之睿足以作聖然後能以八柄馭羣臣八統馭萬民而賞無不慶刑無不威遠無不至邇無不服傅說所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聰明作元后元后作民父母所謂天降下民作之君作之師惟其克相上帝寵綏四方箕子所謂皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也何謂六寢六宫曰王大寢一小寢五大寢聽政嚮明而治故在前小寢釋服燕息也故在後其小寢一寢在中四寢在於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫正宫在前五宫在後其制如王之五寢何謂三朝五門曰王宫之外門一曰臯門二曰雉門三曰庫門四曰應門五曰路門又曰虎門又曰畢門此鄭司農說也康成以雉門在庫門內而設兩觀其朝在雉門之外者曰外朝在路門之外者曰治朝路寢之廷曰內朝臯門之內外朝也朝士掌其法小司農掌其政列三槐與九棘設嘉石與肺石而朝諸侯聽詔詢大事在焉應門之內治朝也司士正其位宰夫掌其法大僕正王之位而王日視朝在焉路門之內燕朝也太僕正其位掌擯相族人朝焉玉藻曰朝服以視朝退適路寢聽政然則王日視朝於治朝而退聽政於燕朝矣雉門之外懸象治所以待民應門之外設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之內亦九室九嬪居焉外朝之法朝士掌之左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉小宗伯職曰建國之神位右社稷左宗廟然則外朝在庫門之外臯門之內與今司徒府有天子以下大會殿亦古之外朝哉周天子諸侯皆有三朝外朝一內朝二內朝之在路門之內者或謂之燕朝何謂貨賄曰有太府以受其貨賄之入關市之賦以待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家稍之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜豫凡邦國之貢以待弔用凡萬民之貢以充府庫凡式貢之餘財以供玩好之用而金玉玩好玉府掌之良兵良器內府掌之王后世子衣服之用則外府掌之文集之禮天子天子視學以齒嘗為臣者弗臣或疑此句未純恐其終使人不臣如蔡卞之扶植王安石也曰天子自有尊師重道之意亦豈可遏只為蔡卞是小人王安石未為大賢蔡卞只是扶他以證其邪說故喫人議論如了翁論他也是若真有伊周之德雖是故臣稍加尊敬亦何害天子入學父事三老兄事五更便是以齒不臣之也如或人之論則廢此禮可也語類失名問虞禮子為尸父拜之曰古人大抵如此如子冠母先拜之子却答拜而今這處都行不得看來古人上下之際雖是嚴而情意甚相通如禹拜昌言王拜手稽首之類到漢以來皇帝見丞相在坐為起在輿為下贊者曰皇帝為丞相起尚有這意思到六朝以來君臣逐日相與說話如宋文帝明日欲殺某人晚間更與他說話不能得他去其間有入朝去從人即分散去到晚他方出到唐尚有坐說話底意思而今宰相終年立地不曾得一日坐人主或終日不曾得見面壽皇求治之初中間學士固是直宿又分講官亦直宿又令從官亦得入賜坐從容講論而今未論朝廷如古人州郡之間亦自如此如羅池碑云栁子厚與牙將歐陽翼共飲法帖中有顔真卿與蔡明遠帖都書名牙將即是客將蔡明遠亦是衙前他却與之情意如此而今州郡與小官也不如此了語類孫録林䕫古人屋無廊廡三公露立於槐下九卿露立於棘下當其朝會有雨則止曾子問諸侯見天子入門而雨霑服失容則廢語類録陳淳不有敬事不敢袒裼不涉不撅看來此三句文義一樣古注誤作兩段解言尊長之前有敬事方敢袒裼敬事如習射之類射而袒裼乃為敬若非敬事而以勞倦袒裼則是不敬惟涉水而後撅若不涉而撅則為不敬如云勞毋袒暑毋褰裳若非敬事雖勞亦不敢袒惟涉水乃可褰裳若非涉水雖盛暑亦不敢褰裳也語類録沈僴禮妻之父曰舅謂我舅者吾謂之甥古禮甥字用處極多如壻謂之甥姑之子亦曰甥或問姪字本非兄弟之子所當稱曰然伊川嘗言之胡文定家子弟稱猶子禮兄弟之子猶子也亦不成稱呼嘗見文定家將伊川語録凡家書說姪處皆作猶子私嘗怪之後見他本只作姪字乃知猶子字文定所改以伊川嘗非之故也殊不知伊川雖非之然未有一字替得亦且只得從俗若改為猶子豈不駭俗據禮兄弟之子當稱從子為是自曾祖而下三代稱從子自髙祖四世而上稱族子語類録沈僴幼名冠字五十以伯仲死諡周道也所謂以伯仲者蓋古者初冠而字便有伯某父仲某父三字了及到得五十即除了下面兩字猶今人不敢斥尊者呼為幾丈之類今日偶看儀禮疏中却云既冠之時即是權以此三字加之實未嘗稱也到五十方才稱此三字某初疑其不然却去取禮記看見其疏中正是如前說蓋當時疏是兩人做孔頴達賈公彥故不相照管語類孫林夔録問左右必竟孰為尊曰漢初右丞相居左丞相之上史中有言曰朝廷無出其右者則是右為尊也到後來又却以左為尊而老子有曰上將軍處右而偏將軍處左喪事尚右兵凶器也故以喪禮處之如此則吉事尚左矣漢初豈習於戰國與暴秦之所為乎語類輔廣録拜親時須合坐受叔伯母亦合坐受兄只立受嫂叔同一家不可不拜亦須對拜夫婦對拜語類録包揚古人之坐者兩膝著地因反其跖而坐於其上正如今之胡跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓於手上也其為稽首則又却其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之類凡言坐者皆謂跪也若漢文帝與賈生語不覺膝之前於席管寧坐不箕股榻當膝處皆穿皆其明驗老子云雖有拱璧以先駟馬不如坐進此道蓋坐即跪也進猶獻也言以重寶厚禮與人不如跪而告之以此道也今說者乃以為坐禪之意誤矣然記又云授立不跪授坐不跪莊子亦云跪坐而進之則跪與坐又似有小異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以尻著地而稍安者為坐也又詩云不遑啓居而其傳以啓為跪爾雅以妥為安而疏以為安定之坐夫以啓對居而訓啓而跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知蓋兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春說太祝九拜處解竒拜云拜時先屈一膝今之雅拜也夫特以先屈一膝為雅拜則他拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問豫即略為考禮如前之云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得已而為塑像則當倣此以免於蘇子俯伏匍匐之譏子言又不謂然會豫亦辭江東之節遂不能强然至今以為恨也東坡文集私試䇿問云古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就地其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時琢石所為尤足据信不知蘇公蜀人何以不見而云爾也及楊子方直入蜀帥幕府因使訪焉則果如所聞者且為寫放文翁石像為小土偶以來而塑手不精或者猶意其或為加趺也去年又以屬蜀漕楊王休子美今乃并得先聖先師二像木刻精好視其坐後兩跖隱然見於帷裳之下然後審其所以坐者果為跪而亡疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之繆為之喟然太息姑記本末寫寄洞學諸生使書而揭之廟門之左以俟來者考焉文集跪坐拜說疏云此九拜之中四種是正拜五者逐事主名還依四種正拜而為之也又云稽首頓首空首此三者正拜也肅拜婦人之正拜也其餘五者附此四種振動吉拜凶拜褒拜附稽首竒拜附空首又云空首一拜其餘皆再拜肅拜或再三故郤至三肅使者一曰稽首注曰拜頭至地也疏曰先以兩手拱至地及頭至手又引頭至地多時也稽首稽留之字也稽首拜中最重臣拜君之拜哀十七年公會齊侯盟于蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首襄三年公如晉孟獻子相公稽首知武子曰天子在君辱稽首寡君懼矣郊特牲曰大夫之臣不稽首非尊家臣以避君也是諸侯于天子大夫于諸侯皆當稽首二曰頓首注曰拜頭叩地也疏曰先以兩手拱至地乃頭至手而又引頭即舉也頭叩地謂若以首叩物然此平敵自相拜家臣於大夫及凡自敵者皆當從頓首之拜也記疏曰頭叩地不停留地也又曰諸侯相拜則然三曰空首注曰拜頭至手所謂拜手也疏曰先以兩手拱至地乃頭至手也以其頭不至地故名空首君答臣下拜也其有敬事亦稽首洛誥曰拜手稽首是也又曰稽首頓首空首此三者相因而為之空首而引頭頓地即舉故名頓首頓首而引頭至地稽留多時故名稽首此三者之正拜也四曰振動注曰戰栗變動之拜書曰王動色變記疏曰謂有敬懼故為振動疏曰案中候膺云季秋七月甲子赤雀銜丹入酆王再拜稽首受案今文太誓得火烏之瑞使以周公書報於王王動色變雖不見拜文與文王受赤雀之命為稽首拜也五曰吉拜六曰凶拜注曰吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者疏曰拜而後稽顙謂先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙記曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也疏曰拜是為親痛深貌惻隱之至也記又曰晉獻公薨秦穆公使人弔公子重耳勸其反國重耳稽顙而不拜哭而起穆公曰稽顙而不拜則未為後也故不成拜哭而起則愛父也疏曰若為後則當拜謝其恩今不受其勸故不拜謝所以稽顙者自為父喪哀號也凡喪禮先稽顙而後拜乃成直稽顙而不拜故云不成拜也今既聞父死勸其反國之義哀慟而起若欲攀轅然故云則愛父也七曰竒拜八曰褒拜注曰杜子春云竒讀為竒偶之竒鄭大夫云竒拜謂一拜答臣下拜褒拜再拜神與尸杜子春書又曰竒拜先屈一膝今雅拜是疏云後鄭不從此說九曰肅拜注曰肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者疏曰肅拜者拜中最輕唯軍中有此肅拜婦人亦以肅拜為正又曰儀禮賓撎入門推手曰揖引手曰撎記疏曰少儀婦人吉事雖有君賜肅拜文集辨九拜漢文帝十三年六月除田租荀氏論曰古者什一而稅以為天下之中正也今漢民或百一而稅可謂鮮矣然豪彊富人占田逾侈此處疑有闕字輸其賦太半官收百一之稅民收太半之賦官家之惠優於三代豪彊之暴酷於亡秦是上惠不通威福分於豪彊也今不正其本而務除租稅適足以資富彊夫土地者天下之大本也春秋之義諸侯不得專封大夫不得專地今豪民占田或至數百千頃富過王侯是自專封也買賣由已是自專其地也孝武時董仲舒嘗言宜限民名田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施然三十頃有不平矣且夫井田之制宜於民衆之時地廣民稀勿為可也然欲廢之於寡立之於衆土地既富列在豪彊卒而規之竝起怨心則生紛亂制度難行由是觀之若髙帝初定天下及光武中興之後民人稀少立之易矣就未悉備井田之法宜以口數占田為立科限民得耕種不得買賣以贍貧弱以防兼并且為制度張本不亦宜乎雖古今異制損益隨時然綱紀大略其致一也本志曰古者建步立畝六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之一夫一婦受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍出入相交佇班志作守望相接疾病相救民受田上田夫百畝中田夫二百畝下田夫三百畝歲更耕之換易其處何休曰司空謹别田之髙下善惡分為三品上田一歲一墾中田二歲一墾下田三歲一墾肥饒不得獨樂墝埆不得獨苦三年一換土易居其家衆男為餘夫亦以口受田如此比士工商家受田五口乃當農夫一人有賦有稅賦謂計口發財六字係班志顔注稅謂公田什一及工商衡虞之入也賦供車馬兵甲士徒之役充實府庫賜豫之費稅給郊社宗廟百神之祀天子奉養百官祿食庶事之費充實以下並班志文民年二十受田六十歸田種榖必雜五種以備災害田中弗得有樹以妨五穀力耕數耘收穫如寇盜之至環廬種桑菜茹有畦瓜瓠果蓏植於疆畔雞豚狗豕無失其時女修蠶織五十則可以衣帛七十則可以食肉五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉鄉萬二千五百户比長位下士自此以上稍登一級至鄉為大夫矣於是閭有序而鄉有庠序以明教庠以行禮而視化焉春令民畢出於野其詩云同我婦子饁彼南畝田畯至喜冬則畢入於邑其詩云嗟我婦子曰為改歲入此室處春則出民閭胥平旦坐於左孰比長坐於右孰畢出而後歸夕亦如之入者必薪樵輕重相分班白不提挈何休曰晏出後時者不得出暮不持樵者不得入冬則民既入婦人同巷夜績女工一月得四十五日功必相從者所以省費燭火同工拙而合習俗也男女有不得其所者因而相與歌詠以言其情是月餘子亦在序室未征役為餘子八歲入小學學六甲四方五行書計之事始知室家長幼之節始知以下班志文十五入大學學先王禮樂而知朝廷二字班志君臣之禮其有秀異者移於鄉學鄉學之秀移於國學學於小學諸侯歲貢小學之秀者於天子學於大學其有秀者命曰造士行同而能偶别之以射於鄉學以下以何休說增損修定然後爵命焉孟春之月羣居將散行人振木鐸以狥於路以採詩獻之太師比其音律以聞於天子何休曰男年六十女年五十無子者官衣食之使之民間求詩鄉移於邑邑移於國國以聞於天子三年耕則餘一年之畜故三年有成成此功也故王者三載考績九年耕餘三年之食進業曰登故三考黜陟再登曰平餘六年食三登曰泰平二十七歲餘九年食然後至德流洽禮樂成焉故曰如有王者必世而後仁繇此道也九年以下竝以班志修定書曰天秩有禮天討有罪故聖人因天秩而制五禮因天討而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為衆衆班志竝作終字十為同同方百里同十為封封十為畿畿方千里地四井為邑四邑為邱邱十六井有戎馬一匹牛三頭四邱為甸六十四井有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂司馬之法一同百里提封萬井除山川坑塹城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者謂之千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩於農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒羣牧五年大簡輿徒此先王為國立武足兵之大略也文集類說井田五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂制田里之法也五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍此鄉遂出兵之法也故曰凡起徒役無過家一人既一家出一人則兵數宜甚多然只是擁衛王室如今禁衛相似不令征行也都鄙之法則九夫為井四井為邑四邑為邱四邱為甸然後出長轂一乘甲士三人步卒七十二人以五百一十二家而共只出七十五人則可謂甚少然有征行則發此都鄙之兵悉調者不用而用者不悉調此二法所以不同而貢助之法亦異大率鄉遂以十為數是長連排去井田以九為數是一箇方底物事自是不同而永嘉必欲合之如何合得語類祖録李閎問都鄙四邱為甸甸六十四井出車一乘甲士三人步卒七十二人不審鄉遂車賦則如何曰鄉遂亦有車但不可見其制六鄉一家出一人排門是兵都鄙七家而出一兵在內者役重而賦輕在外者役輕而賦重六軍只是六鄉之軍六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之衆三遂不與大國三郊次國二郊小國一郊蔡季通說車一乘不止甲士三人步卒七十二人此是輕車用馬馳者更有二十五人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬亦具其說矣語類録陳淳自三代後車服冠冕之制前漢皆不說只後漢志內略載又多不可曉語類失名問不學雜服不能安禮鄭注謂服是皮辨冕服橫渠謂服事也如灑掃應對沃盥之類曰恐只如鄭說古人服各有等降若理會得雜服則於禮亦思過半矣如冕服是天子祭服皮辨是天子朝服諸侯助祭於天子則服冕服自祭於其廟則服辨冕大夫助祭於諸侯則服𤣥冕自祭於其廟則服皮辨又如天子常朝則服皮辨朔旦則服𤣥冕無旒之冕也諸侯常朝則用𤣥端朔旦則服皮辨大夫私朝亦用𤣥端夕深衣士則𤣥端以祭上士𤣥裳中士黃裳下士雜裳前𤣥後黃也庶人深衣語類録沈僴裁用細白布度用指尺中指中節為寸衣二幅不裁其長過脅下屬於裳用布二幅中屈而下垂之如今之直領衫但不裁破掖下每幅之下屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聨其縫以屬於衣每三幅屬衣一幅圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸圓殺之以至袂口則其徑一尺二寸方領兩襟相掩衽在掖下則兩領之會自方曲裾用布一幅如裳之長交解裁之疊兩廣頭竝令向上布邊不動但稍裁其內旁太半之下令漸如魚腹末如鳥喙內向而緝之相沓綴於裳上之右旁以掩裳際右幅在下左幅在上布邊在外裁處在內衣裳皆緣緣用黑繒具父母以青大父母以繢領表裏各二寸裳下及邊表裏各一寸半皆就布緣袂口表裏亦一寸半布外接出大帶帶用白繒廣四寸夾縫之其長圍要而結於前再繚之為兩耳及垂其餘為紳下與裳齊以繒緣其紳之兩旁及下表裏各半寸如緣之色復以五綵絛廣二分約其相結處長與紳齊緇冠糊紙為之武髙寸許前後三寸左右四寸上為五梁辟積左縫廣四寸長八寸跨頂前後著於武外反屈其兩端各半寸內向黑漆之武之兩旁半寸之上竅以受筓筓用齒骨凡白物幅巾用黑繒六尺許刺一邊作巾額當中作兩旁三寸許各綴一帶廣一寸許長二尺許循中上反屈之當幅之中斜縫向後去其一角而復反之使巾頂正圓乃以額當頭前向後圍裹而繫其帶於緇後餘者垂之黑履白絇繶純綦文集制深衣度曾子襲裘而弔子游裼裘而弔裘似今之襖子裼衣似今背子襲衣似今涼衫公服襲裘者冒之不使外見裼裘者袒其半而以襌衣襯出之緇衣羔裘素衣麑裘黃衣狐裘緇衣素衣黃衣即裼衣欲其相稱也語類沈僴録古者有祭服有朝服祭服所謂鷩冕之類朝服所謂皮辨𤣥端之類天子諸侯各有等差自漢以來祭亦用冕服朝服則所謂進賢冠絳紗袍隋煬帝時始令百官戎服唐人謂之便服又謂之從省服乃今之公服也祖宗以來亦有冕服車騎黃緑作旗之類而不常用惟大典禮則用之然將用之時必先出許多物色於庭所持之人又須有賞賜於是將用之前有司必先入文字取指揮例降旨權免語類孫録林夔上領服非古服看古賢如孔門弟子衣服如今道服却有此意古畫亦未有上領者惟是唐時人便服此蓋自唐初已雜蠻夷之服矣語類孫録葉賀因言服制之變前輩無著背子者雖婦人亦無之士大夫常居常服紗帽皂衫革帶無此則不敢出背子起殊未久或問婦人不著背子則何服曰大衣問大衣非命婦亦可服否曰可僴因舉胡德輝雜志云背子本婢妾之服以其行直主母之背故名背子後來習俗相承遂為男女辨貴賤之服曰然然嘗見前輩雜說中載上御便殿著紗帽背子則國初已有背子矣皆不可曉又曰後世禮服固未能猝復先王之舊且得華夷稍有辨别猶得今世之服大抵皆夷服如上領衫靴鞋之類先王冠服掃地盡矣中國衣冠之亂自晉時始後來遂相承襲唐接隋隋接周周接元魏大抵皆夷服問今公服起於何時曰隋煬帝游幸令羣臣皆以戎服從三品以上服紫五品以上服緋六品以下服緑只從此起遂為不易之制又問公服何故如許闊曰亦是積漸而然初不知所起嘗見唐人畫十八學士裹幞頭公服極窄畫裴晉公諸人則稍闊及畫晚唐王鐸輩則又闊相承至今又益闊也嘗見前輩說紹興初某人欲製公服呼針匠計料匠云少三尺許某人遂寄往都下製造及得之以示針匠匠曰此不中格式某不敢為也某人問其故曰但看袖必短據格式袖合與下襜齊至地不然則不可以入閣門彼時猶守得這意思今亦不復存矣唐人有官者公服幞頭不離身以此為常服又别有朝服如進賢冠中單服之類其下又有省服服為常服今之公服即唐之省服服也又問幞頭所起曰亦不知所起但諸家小說中時班駁見一二如王彥輔塵史猶略言之某少時尚見唐時小說極多今皆不復存矣唐人幞頭初止以紗為之後以其軟遂斫木作一山子在前襯起名曰軍容頭其說以為起於魚朝恩一時人爭效士大夫欲為幞頭則曰為我斫一軍容頭來及朝恩被誅人以為語䜟其先幞頭四角有腳兩腳繫向前兩腳繫向後後來遂橫兩腳以鐵線張之然惟人主得裹此世所畫唐明皇已裹兩腳者但比今甚短後來藩鎮遂亦僭用想得士大夫因此亦皆用之但不知幾時展得如此長嘗見禪家語録載唐莊宗問一僧云朕收中原得一寶未有人酬賈僧曰略借陛下寶看莊宗以手展幞頭兩腳示之如此則五代時猶是惟人君得裹兩腳者然皆莫可考也桐木山子相承用至本朝遂易以藤織者而以紗帽之近時方易以漆紗嘗見南劍沙溪一士夫家尚收得上世所藏幞頭猶是藤織坯子唐製又有兩腳上下者亦莫可曉語類録沈僴摯是初見君時用以獻君二生一死皆是抱羔鴈雉真物以獻如今笏却是古人記事手板插之帶間今人笏却是用行禮記事但其私記也今之公服皆古之戎服古公服是法服朱衣皂褖冠則三公用貂蟬御史用獬豸衣之上則繫帶帶劍之類六七件隋煬帝南遊命羣臣以戎服從大臣紫中緋小緑今之成羣成隊試進士詩賦亦煬帝法也金銀魚乃古人以合符臣之得魚符者用袋之腰間今無合符事却尚用魚又不用袋魚魚袋事出唐書輿服志髙武中睿時語類録包揚今衣服無章上下混淆某嘗謂縱未能大定經制且隨時略加整頓猶愈於不為如小衫合各從公衫之色服紫者小衫亦紫服緋緑者小衫亦緋緑服白則小衫亦白胥吏則皆烏衣餘皆倣此庶有辨别也語類李閎祖録問古者男子殊衣裳婦人不殊裳今以古人連屬之衰加於婦人殊裳之制加於男子則世俗未之嘗見皆以為迂且怪而不以為禮也曰若考得古制分明改之固善若以為難即且從俗亦無甚害又問大帶申束衣革帶以佩玉佩及事佩之等喪服無所佩既有要絰而絞帶復何用焉曰絞帶正象革帶但無佩耳不必疑於用也革帶是正帶以束衣者不專為佩而設大帶乃申束之耳申重也故謂之紳文集子從答郭古人戴冠郭林宗時戴巾溫公幅巾是其類也古人衣冠大率如今之道士道士以冠為禮不戴巾婦人環髻今之時髻是其意也不戴冠語類録包揚今官員執笏最無道理笏者只是君前記事恐事多須以紙粘笏上記其頭緒或在君前不可以手指人物須用笏指之此笏常插在腰間不執在手中夫子攝齊升堂何曾手中有笏攝齊者畏謹恐上階時踏著裳有顛仆之患執圭者圭自是贄見之物只是捧至君前不是如執笏所以執圭時便足蹜蹜如有循緣手中有圭不得攝齊亦防顛仆語類作録周明論明堂之制者非一某竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右個東之北為青陽左個南之中為明堂太廟南之東即東之南為明堂左個南之西即西之南為明堂右個西之中為總章太廟西之南即南之西為總章左個西之北即北之西為總章右個北之中為𤣥堂太廟北之東即東之北為𤣥堂右個北之西即西之北為𤣥堂左個中央為太廟太室凡四方之太廟異方所其左個右個則青陽之右個乃明堂之左個明堂之右個乃總章之左個也總章之右個乃𤣥堂之左個𤣥堂之右個乃青陽之左個也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐也是語類録劉砥殿屋五間前皆為堂後為房室中間之前為兩楹間後為室東間之前為東楹之東又少東為阼階上少北為東序後為東房西間之前為西楹之西又少西為賓階上少北為西序後為西房序即牆也設位在東西序者負牆而立也其南為序端東序之東西序之西為夾亦謂之廂又說文云廂廊也廊東西序也此亦可見但疑序下脫一外字其前為東西堂其後為東西夾室夾外之亷為側階房後為北階此其地之盤也其棟則中三間為一棟橫指東西至兩序之上而盡遂自此處分為四棟邪指四隅上接橫棟下與霤齊此其上棟之制所謂四阿也其宇則橫棟前後即為南北兩下橫棟盡外即為東西兩下四棟之旁即各連所向而下四面榱桷覆堂亷出階外者謂之廡說文云廡堂下周屋也其屋盡水下處謂之霤此其下宇之制也厦屋則前五間後四間無西房堂中三間之後只分為兩間東房西室其餘竝如殿屋之制但五間皆為橫棟棟之前後皆為兩下之宇橫棟盡外有版下垂謂之摶風摶風之下亦為兩廡接連南北以覆側階但其廡亦不出摶風之外耳儀禮疏云卿大夫為夏屋其室兩下而四周之殿屋四阿連下為廡四面之簷其水皆多故其簷皆得以霤為名厦屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但為腰簷不連棟下又不出摶風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名疏乃直指摶風誤矣文集厦屋說殿屋宫室之名制不盡見於經其可考者宫必南鄉廟在寢東皆有堂有門其外有大門周禮建國之神位右社稷左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北蓋直寢故士喪禮注以寢門為內門中門凡既入外門其向廟也皆曲而東行又曲而北案士冠禮賓立於外門之外主人迎賓入每曲揖至于廟門注曰入外門將東曲揖直廟將北曲又揖是也又按聘禮公迎賓于大門內每門每曲揖及廟門賈氏曰諸侯五廟太祖之廟居中二昭居東二穆居西每廟之前兩旁有隔牆牆皆閣門諸侯受聘于太祖廟太祖廟以西隔牆有三大門東行至太祖廟凡經三閣門故曰每門也大夫三廟其牆與門亦然故賓問大夫大夫迎賓入亦每門每曲揖乃及廟門其說當考大夫士之門惟外門內門而已諸侯則三天子則五庠序則惟有一門鄉飲酒射禮主人迎賔于門外入門即三揖至階是也堂之屋南北五架中脊之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰庪賈氏曰中脊為棟棟前一架為楣楣前接簷為庪今見於經者惟棟與楣而已棟一名阿按士昏禮賓升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賓升皆當楣此深入當棟故云入堂深也又按聘禮賓升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異爾後楣以北為室與房後楣以下以南為堂以北為室與房室與房東西相連為之按少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架棟北楣下為室南壁而開户以兩架之間為室故云迫狹也昏禮賓當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室按鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賓南面注曰不言于户牖之間者此射于序賈氏曰無室則無户牖故也釋宫曰無室曰榭即序也人君左右房大夫士東房西室而已聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然按聘禮賓館于大夫士君使卿還玉于館也賓亦退負右房則大夫亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考室中西南隅謂之奧邢昺曰室户不當中而近東西南隅最為深隱故謂之奧而祭祀及尊者常處焉東南隅謂之窔郭氏曰窔亦隱暗西北隅謂之屋漏詩所謂尚不愧于屋漏是也曾子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得户明者經止曰西北隅室南其户户東而牖西說文曰户半門也牖穿壁以木為交窗也月令正義曰古者窟居開其上取明雨因霤之是以後人名室為中霤開牖者象中霤之取明也牖一名鄉其扇在內案士虞禮祝闔牖户如食間啓户啓牖鄉注曰牖先闔後啓扇在內也鄉牖一名是也户牖之間謂之依郭氏曰窗東户西也覲禮斧扆亦以設之於此而得扆名士昏禮注曰户西者尊處以尊者及賓客位于此故又曰客位户東曰房户之間士冠禮注曰房西室户東也寢廟以室為主故室户專得户名凡言户者皆室户若房户則兼言房以别之大夫士房户之間於堂為東西之中按詩正義曰鄉飲酒義云尊于房户之間賓主共之由無西房故以房與室户之間為中也又鄉飲酒禮席賓于户牖間而義曰坐賔于西北則大夫士之户牖間在西而房户間為正中明矣人君之制經無明證按釋宫曰兩階間謂之鄉郭氏曰人君南鄉當階間則人君之室正中其西為右房而户牖間設扆處正中矣又按詩斯干曰築室百堵西南其户箋曰天子之寢左右房異於一房者之室户也正義曰大夫惟有一東房故室户偏東與房相近天子諸侯既有右房則室當在其中其户正中比一房之室户為西當考房户之西曰房外士昏禮記母南面于房外女出于母左士冠禮尊于房户之間若庶子則冠于房外南面注曰謂尊東也是房户之西得房外之名也房之户於房南壁亦當近東按士昏禮注曰北堂在房中半以北洗南北直室東隅東西直房户與隅間隅間者蓋房東西之中兩隅間也房中之東其南為夾洗直房户而在房東西之中則房户在房南壁之東偏可見矣房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連為之房無北壁故得北堂之名按特牲饋食禮記尊兩壺於房中西牖下南上內賓立于其北東靣南上宗婦北堂東靣北上內賓在宗婦之北乃云北堂又婦洗在北堂而直室東隅是房中半以北為北堂也婦洗在北堂而士虞禮主婦洗足爵於房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也堂之上東西有楹楹柱也古之築室者以垣墉為基而屋其上惟堂上有兩楹而已楹之設蓋於前楣之下按鄉射禮曰射自楹間注曰謂射於庠也又曰序則物當棟堂則物當楣物畫地為物射時所立處也堂謂庠之堂也又曰豫則鈎楹內堂則由楹外當物北面揖豫即序也鈎楹繞楹也物當棟而升射者必鈎楹內乃北面就物則棟在楹之內矣物當楣而升射者由楹外北面就物又鄭氏以為物在楹間則楹在楣之下也又按釋宫曰梁上楹謂之棁棁侏儒柱也梁楣也侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于楹外簠簋陳于楹內兩楹間言楹內外矣又言兩楹間知凡言兩楹間者不必與楹相當謂堂東西之中爾南北之中曰中堂聘禮受玉於中堂與東楹之間注曰中堂南北之中也入堂深尊賓事也賈氏曰後楣以南為堂堂凡四架前楣與棟之間為南北堂之中公當楣拜訖更前北侵半架受玉故曰入堂深也按東楹之間侵近東楹非堂東西之中而曰中堂則中堂為南北之中明矣又按士喪禮注曰中以南謂之堂賈氏曰堂上行事非專一所若近户即言户東户西近房則言房外房東近楹即言東楹西楹近序即言東序西序近階即言東階西階其堂半以南無所繼屬者即以堂言之祝淅米于堂是也堂之東西牆謂之序郭氏曰所以序别內外序之外謂之夾室公食大夫禮大夫立于東夾南注曰東於堂賈氏曰序以西為正堂序東有夾室今立于堂下當東夾是東於堂也又按公食禮宰東夾北西面賈氏曰位在北堂之南與夾室相當特牲饋食禮豆籩鉶在東房注曰東房房中之東當夾北則東夾之北通為房中矣室中之西與右房之制無明文東夾之北為房中則西夾之北蓋通為室中其有兩房者則西夾之北通為右房也歟夾室之前曰廂亦曰東堂西堂覲禮記注曰東廂東夾之前相翔待事之處特牲饋食禮注曰西堂西夾之前近南耳賈氏曰即兩廂也釋宫曰室有東西廂曰廟郭氏曰夾室前堂是東廂亦曰東堂西廂亦曰西堂也釋宫又曰無東西廂有室曰寢按書顧命疏寢有東夾西夾士喪禮死于適寢主人降襲絰于序東注曰序東東夾前則正寢亦有夾與廂矣釋宫所謂無東西廂者或者謂廟之寢也歟凡無夾室者則序以外通謂之東堂西堂按鄉射禮主人之弓矢在東序東大射儀君之弓矢適東堂大射之東堂即鄉射之東序東也此東西堂堂各有階按雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東面階東面階則東堂之階其西堂有西面階也東堂下西堂下曰堂東堂西大射儀賓之弓矢止于西堂下其將射也賓降取弓矢于堂西堂西即西堂下也特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁則自西壁以東皆謂之西堂下矣又按大射儀執者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以達北堂也堂角有坫士冠禮注曰坫在堂角賈氏釋士喪禮曰堂隅有坫以土為之或謂堂隅為坫也堂之側邊曰堂廉鄉飲酒禮設席于堂廉注曰側邊曰廉喪大記正義曰堂廉堂基南畔廉稜之上也又按鄉射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賓客也每階有東西兩廉聘禮饔鼎設于西階前當內廉此則西階之東廉以其近堂之中故曰內廉也士之階三等按士冠禮降三等受爵辨注曰下至也賈氏曰匠人云天子之堂九尺賈馬以為階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序按鄉射禮升階者升自西階繞楹而東燕禮媵爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攢置于西序而檀弓曰周人殯于西階之上故知階近序也堂下至門謂之庭三分庭一在北設碑聘禮注曰宫必有碑所以識日景知陰陽也賈氏釋士昏禮曰碑在堂下三分庭一在北按聘禮歸饔餼醯醢夾碑米設於中庭注曰庭實固當庭中言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂廉北至房室之壁三分庭一在北設碑而碑如堂深則庭蓋三堂之深也又按鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門內霤凡入門之後皆三揖至階昏禮注曰三揖者至內霤將曲揖既曲北面揖當碑揖賈氏曰至內霤將曲者至門內霤主人將東賓將西賓主相背時也既曲北面者賓主各至堂塗北行向堂時也至內霤而東西行趨堂塗則堂塗接於霤矣既至堂塗北面至階而不復有曲則堂塗直階矣又按聘禮饔鼎設于西階前陪鼎當內廉注曰辟堂塗也則堂塗在階廉之內矣鄉飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂塗也中門屋為門門之中有闑士冠禮曰席于門中闑西閾外注曰闑橛也玉藻正義曰闑門之中央所豎短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也然則闑者門中所豎短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰柣謂之閾郭氏曰閾門限邢昺曰謂門下橫木為內外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹按士昏禮曰納徵儷皮記曰執皮左首隨入注曰隨入為門中厄狹賈氏曰皮皆橫執之門中厄狹故隨入也匠人云廟門容大扃七箇大扃牛鼎之扃長三尺七箇二丈一尺彼天子廟門此士之廟門降殺甚小故云厄狹也推此則自士以上宫室之制雖同而其廣狹則異矣夾門之堂謂之孰釋宫曰門側之堂謂之孰郭氏曰夾門堂也門之內外其東西皆有孰一門而孰四其外南鄉按士虞禮陳鼎門外之右匕俎在西孰之西注曰孰有西者是室南鄉又按士冠禮擯者負東孰注曰東孰門內東堂負之北面則內孰北向也凡門之內兩孰之間謂之寧按聘禮賓問卿大夫迎于外門外及廟門大夫揖入擯者請命賓入三揖竝行注曰大夫揖入者省內事也既而俟于寧也凡至門內霤為三揖之始上言揖入下言三揖竝行則俟于霤南門內兩孰間可知矣李巡曰寧正門內兩孰間義與鄭同謂之寧者以人君門外有正朝視朝則於此寧立故耳周人門與堂修廣之數不著於經按匠人云夏后氏世室堂修二七廣四修一堂修謂堂南北之深其廣則益以四分修之一也門堂三之二室三之一門堂通謂門與孰其廣與修取數於堂得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺於堂之數亦可得而知矣門之內外東方曰門東西方曰門西特牲饋食禮注曰凡鄉內以入為左右鄉外以出為左右士冠禮注又曰出以東為左入以東為右以入為左右則門西為左門東為右鄉飲酒禮賓入門左燕禮卿大夫皆入門右是也以出為左右則門東為左門西為右士冠禮主人迎賓出門左西面士虞禮側享于廟門之右是也闑東曰闑右亦自入者言之也天子諸侯門外之制其見於經者天子有屏諸侯有朝按覲禮侯氏入門右告聽事出自屏南適門西注曰天子外屏釋宫曰屏謂之樹郭氏曰小牆當門中曲禮正義曰天子外屏屏在路門之外諸侯內屏屏在路門之內此侯氏出門而隱於屏則天子外屏明矣釋宫又曰門屏之間謂之寧謂寧在門之內屏之外此屏據諸侯內屏而言也諸侯路寢門外則有正朝大門外則有外朝按聘禮夕幣于寢門外宰入告具于君君朝服出門左南鄉注曰寢門外朝也入告入路門而告賈氏曰此路門外正朝之處也是正朝在寢門外也聘禮又賓死介復命柩止于門外若介死惟上介造于朝注曰門外大門外也必以柩造朝達其中心又賓拜饔餼于朝注曰拜于大門外賈氏曰大門外諸侯之外朝也賓拜于朝無入門之文則諸侯外朝在大門外明矣是外朝在大門外也諸侯三朝其燕朝在寢燕禮是也正朝與外朝之制度不見於經蓋不可得而考矣寢之後有下室士喪禮記士處適寢又曰朔月若薦新則不饋于下室注曰下室如今之內堂正寢聽事賈氏曰下室燕寢也然則士之下室於天子諸侯則為小寢也春秋傳曰子太叔之廟在道南其寢在廟北其寢廟之寢也廟寢在廟之北則下室在適寢之後可知矣又按喪服傳曰有東宫有西宫有南宫有北宫異宫而同財內則曰由命士以上父子皆異宫賈氏釋士昏禮曰異宫者别有寢若不命之士父子雖大院同居其中亦隔别各有門户則下室之外又有異宫也自門以北皆周以牆聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邊牆以出柩也士喪禮為垼于西牆下注曰西牆中庭之西特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁注曰西壁堂之西牆下按門之西有牆則牆屬于門矣西牆在中庭之西則牆周乎庭矣西壁在西牆下則牆周乎堂矣牆者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂墉堂下謂之壁謂之牆其實一也隨所在而異其名爾堂下之壁闈門在焉按士冠禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賓出主人送主婦亦拜賓注曰女賓也不言出不言送拜之於闈門之內闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰為相通小門也是正門之外又有闈門而在旁壁也人君之堂屋為四注大夫士則南北兩下而已士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室為夏屋燕禮設洗當東霤注曰人君為殿屋也按考工記殿四阿重屋注曰四阿若今之四柱屋殷人始為四柱屋則夏后氏之屋南北兩下而已周制天子諸侯得為殿屋四柱卿大夫以下但為夏屋兩下四柱則南北東西皆有霤兩下則惟南北有霤而東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者說文曰屋水流也徐鍇曰屋檐滴處榮者說文曰屋梠之兩頭起者為榮又曰屋齊謂之檐楚謂之梠郭璞注上林賦曰南榮屋南檐也義與說文同然則檐之東西起者曰榮謂之榮者為屋之榮飾謂之屋翼者言其軒張如翬斯飛耳士喪禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下為之燕禮之門內霤則門屋之北霤也凡屋之檐亦謂之宇按士喪禮為銘置于宇西階上注曰宇梠也說文曰宇屋邊也釋宫曰檐謂之樀郭氏曰屋梠邢昺曰屋檐一名樀一名梠又名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂廉與坫亦當宇矣特牲饋食禮主婦視饎㸑于西堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤鄉射禮記磬階間縮霤是也霤以東西為從故曰縮霤此霤謂堂之南霤也此其著於經而可考者也禮經雖亡闕然於覲見天子之禮於燕射聘食見諸侯之禮餘則見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳按書顧命成王崩於路寢其陳位也有設斧扆牖間南鄉則户牖間也西序東嚮東序西嚮則東西序也西夾南嚮則夾室也東房西房則左右房也賓階面阼階面則兩階前也左孰之前右孰之前則門內之孰也畢門之內則路寢門也兩階戺則堂廉也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又曰諸侯出廟門俟則與士喪禮殯宫曰廟合也然則鄭氏謂天子廟及路寢如明堂制者蓋未必然明堂位與考工記所記明堂之制度者非出於舊典亦未敢必信也又按書多士傳曰天子之堂廣九雉三分其廣以二為內五分內以一為髙東房西房北堂各三雉公侯七雉三分廣以二為內五分內以一為髙東房西房北堂各一雉伯子男五雉三分廣以二為內五分內以一為髙東房西房北堂各一雉士三雉三分廣以二為內五分內以一為髙有室無房堂注曰廣榮間相去也雉長三丈內堂東西序之內也髙穹髙也此傳說房堂及室與經亦不合然必有所據姑存之以備參考文集釋宫儀禮戊巳土律中黃鍾之宫詹卿以為陽生於子至午而盡到未又生出一黃鍾這箇只好說話某思量得不是恁地蓋似些元亨利貞黃鍾略略似箇乾字宫是在中字中間又似是非在惻隱之前其他春音角夏音徵秋音商冬音羽此惟說宫聲如京房律準十三絃中一絃為黃鍾不動十二絃便拄起應十二月語類林夔孫録黃問周禮祀天神地示人鬼之樂何以無商音曰五音無一則不成樂非是無商音只是無商調先儒謂商調是殺聲鬼神畏商調語類録陳淳朱子禮纂卷五
