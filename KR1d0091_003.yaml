body:
  text: 朱子禮纂卷三大學士李光地撰喪問喪服如至尊之喪小官及士庶等服於古皆差儀禮諸侯為天子斬衰三年傳曰君至尊也注天子諸侯及卿大夫有地者皆曰君庶人為國君齊衰三月注不言民而言庶人庶人或有在官者天子畿内之民服天子亦如之以是觀之自古無通天下為天子三年之制前軰恐未之考曰今士庶人既無本國之君服又無至尊服則是無君亦不可不示其變如今涼衫亦不害此亦只存得些影子問士庶亦不可乆庶人為國君亦止齊衰三月諸侯之大夫為天子亦止小功繐衰或問有官人嫁娶在祔廟後曰只不可帶花用樂少示其變又曰至尊之服要好初來三日用古冠服上衣下裳以後却用今所制服四脚幞頭等自京官以上是一等服京官以下是一等服士人又一等服庶人又一等服如此等級分明也好器之問夀皇行三年之喪是誰建議曰自是要行這是甚次第可惜無好宰相將順成此一大事若能因舉行盛典及於天下一整數千百年之陋垂數千百年之成憲是甚次第時相自用紫彩皂帶入臨用白衫待退歸便不著某前日在上前說及三年之喪亦自感動次日即付出與禮官集議意甚好不知後來如何忽又住了却對宰相說也似咤異不知夀皇既已行了又有甚咤異只是亦無人助成此事因檢儀禮注疏說嫡孫承重甚詳君之喪服士庶亦可聚哭但不可設位某在潭州時亦多有民衆欲入衙來哭某初不知外面被門子止約了待兩三日方知遂出榜告示亦有來哭者語類孫錄葉賀儀禮期喪條内注說國君有疾不能為祖父母曾祖父母服則世子斬又曰君喪皆斬說已分明天子無期喪凡有服則必斬三年語類錄陳淳臣聞三年之喪齊疏之服飦粥之食自天子達於庶人無貴賤之殊而禮經勅令子為父嫡孫承重為祖父皆斬衰三年蓋嫡子當為父後以承大宗之重而不能襲位以執喪則嫡孫繼統而代之執喪義當然也然自漢文短喪之後歴世因之天子遂無三年之喪為父且然則嫡孫承重從可知矣人紀廢壊三綱不明千有餘年莫能釐正及我大行夀皇聖帝至性自天孝誠内發易月之外猶執通喪朝衣朝冠皆以大布超越千古拘攣牽制之弊革去百王衰陋卑薄之風甚盛徳也所宜著在方冊為世法程子孫守之永永無斁而間者遺誥初頒太上皇帝偶違康豫不能躬執喪次陛下實以世嫡之重仰承大統則所承重之服著在禮律所宜一遵夀皇已行之法易月之外且以布衣布冠視朝聽政以代太上皇帝躬執三年之喪而一時倉卒不及詳議遂用漆紗淺黄之服不唯上違禮律無以風示天下且將使壽皇已革之弊去而復留已行之禮舉而復墜臣愚不肖誠竊痛之然既往之失不及追改唯有將來啟殯發引禮當復用初喪之服則其變除之節尚有可議欲望陛下仰體壽皇聖孝成法明詔禮官稽考禮律預行指定其官吏軍民男女方喪之禮亦宜稍為之制勿使過為華靡布告郡國咸使聞知庶幾漸復古制而四海之衆有以著於君臣之義實天下萬世之幸取進止文集乞討論䘮服劄子準五服年月格斬衰三年嫡孫為祖謂承重者法意甚明而禮經無文但傳云父没而為祖後者服斬然而不見本經未詳何據但小記云祖父没而為祖母後者三年可以旁照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖之服向來入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此說方得無疑乃知學之不講其害如此而禮經之文誠有闕畧不無待於後人向使無鄭康成則此事終未有決斷不可直謂古經定制一字不可增損也文集槀後書奏臣伏覩今日瑞慶節前一日宰執率文武百竂詣行宫便殿拜表稱賀臣已前來祗赴立班然竊惟念壽皇梓宫在殯階下追慕方新乃以此時講行賀禮臣當以經術入侍帷幄覩此缺失心實未安乆欲奏聞又念疏逺不敢僭越昨晚忽奉睿㫖特令宣引今日晚講仰見聖心虚懐求善唯恐不及待遇之恩復異常品感激之深不能自已謹此密奏欲望聖慈速賜𫝊㫖便令權免其表亦不收接三年之内凡有合稱賀事並依此例庶幾上廣孝治益隆聖徳風示四表垂法萬世文集慶節不受賀劄子乞瑞臣又聞前日賀表雖蒙退出而未降指揮今後合稱賀事三年之内並與權免其節序變遷並合進名奉慰并乞聖明先賜處分庶幾遇事免致失禮文集賀表不受下貼黄聞某人不肯丁所生母憂曰禮為所生父母齊衰杖期律文許申心喪若所生父再娶亦當從律某人是也又問若所生父與所繼父俱再娶當持六喪乎曰固是又問先儒爭濮議事曰此只是理㑹稱親當時蓋有引戾園事欲稱皇考者又問稱皇考是否曰不是然近世儒者亦有多言合稱皇考者語類傑錄萬人沈存中說喪服中曾祖齊衰服曾祖以上皆謂之曾祖恐是如此如此則皆合有齊衰三月服看來髙祖死豈有不為服之理須合行齊衰三月也伊川頃言祖父母喪須是不赴舉後來不曾行法令雖無明文看來為士者為祖父母期服内不當赴舉語類錄沈僴祖在父亡祖母死亦承重語類錄包揚嫡孫承重庶孫是長亦不承語類失名問並有父母之喪葬先輕而後重其奠也先重而後輕其虞也先重而後輕同葬同奠亦何害焉其所先後者其意為如何也曰此雖未詳其義然其法具在不可以己意輒增損也文集子從答郭所喻禮文此等事平昔不曾講究一旦荒迷又不暇問所以例多苟簡不滿人意然喪與其易也寧戚但存其大節使不失吾哀痛之誠心為急此等雖小不備亦不得已也禮服制度見於儀禮為詳諸家皆祖之而有更變爾若必欲致詳可細考也據今所急卜葬為先葬後三虞卒哭而祔祔畢主復於寢以俟三年而後徹几筵此禮經皆有明文不必用他說改易也文集子晦答寥因論喪服曰今人吉服皆已變古獨喪服必欲從古恐不相稱閎祖云雖是如此但古禮已廢幸此喪服尚有古制不猶愈於俱亡乎直卿亦以為然先生曰禮時為大某嘗謂衣冠本以便身古人亦未必一一有義又是逐時增添名物愈繁若要可行須是酌古之制去其重複使之簡易然後可又云一人自在下面做不濟事須是朝廷理㑹一齊與整頓過又云康節說某今人須著今時衣服忒煞不理㑹也語類祖綠李閎喪禮前書已報大概適再考儀禮絰五服皆有之一在首一在要大小有差斬衰條下𫝊中已言之故不復言耳要絰之下又有帶斬衰絞帶齊衰布帶是也蓋絰帶以象吉服之大帶此帶則象吉服之革帶屈其一端立貫之還以插於要間非齊衰則止用布帶而無要絰也右本在上者齊衰絰之制以麻根處著頭右邊而從額前向左圍向頭後却就右邊元麻根處相接即以麻尾藏在麻根之下麻根搭在麻尾之上綴殺之有纓者以其加於冠外故須著纓方不脫落也辟領儀禮注云辟領廣四寸則與濶中八寸也兩之為尺六寸與來書所言不同不知何故詳此辟領是有辟積之義雖廣四寸須用布濶四寸長八寸者摺其兩頭令就中相接即方四寸而綴定上邊於領之旁以所摺向裏平面向外如今裙之有摺即所謂辟積也温公所謂裳每幅作三者是也如此即是一旁用八寸兩旁共尺六寸矣菅屨疏屨今不可考今畧以輕重推之斬衰用今草鞋齊衰用麻鞋可也麻鞋卒伍所著者文集叔謹答周問賀去冬侍坐承斟酌古今之制謂居喪冠服當與吉服稱其制度等級已畧言及近見親戚有居母喪用温公寛袖襕衫布幞頭取其與吉服相符而又加首絰要絰而去温公之布四脚不知可行否曰今考政和五禮喪服却用古制準此而行則亦無特然改制之嫌却恐吉服須講求一酌中制度相與行之耳又問女子適人為父母服期傳云不貳斬也賤婦喪母遂於既葬卒哭而歸繼看喪大記曰喪父母既練而歸期九月既葬而歸注云歸謂歸夫家也其既葬而歸者乃婦人為祖父母為兄弟之為父後者耳賀雖令反終其月數而誤歸之月不知尚可補填乎因思他人或在母家彼此有所不便不可以待練之乆其不可以不歸也又如之何曰補填如今追服意亦近厚或有不便歸而不變其居處飲食之節可也衣服則不可不變此亦以意言之深恐不免汰哉之誚也文集味道答葉䝉諭及祔禮此在髙明考之必已精宻然猶謙遜博謀及於淺陋如此顧某何足以知之然昔遭喪禍亦嘗考之矣竊以衆言淆亂則折諸聖孔子之言萬世不可易矣尚復何說况期而神之之意揆之人情亦為允愜但其節文次第今不可考而周禮則有儀禮之書自始死以至祥禫其節文度數詳焉故温公書儀雖記孔子之言而卒從儀禮之制蓋其意謹於闕疑以為既不得其節文之詳則雖孔子之言亦有所不敢從者耳程子之說意亦甚善然鄭氏說凡祔已反於寢練而後遷廟左氏春秋傳亦有特祀於主之文則是古人之祔固非遂徹几筵程子於此恐其考之有所未詳也開元禮之說則髙氏既非之矣然其自說大祥徹靈坐之後明日乃祔於廟以為不忍一日未有所歸殊不知既徹之後未祔之前尚有一夕其無所歸也乆矣凡此皆有所未安恐不若且從儀禮温公之說次序節文亦自曲有精意如檀弓諸說可見不審尊兄今已如何行之願以示教若猶未也則必不得已而從髙氏之說但祥祭之日未可徹去几筵或遷稍近廟處直俟明日奉主祔廟然後徹之則猶為亡於禮者之禮耳鄙見如此不審髙明以為如何文集答陸子壽先王制禮本緣人情吉凶之際其變有漸故始死全用事生之禮既卒哭祔廟然後神之然猶未忍盡變故主復於寢而以事生之禮事之至三年而遷於廟然後全以神事之也此其禮文見於經傳者不一雖未有言其意者然以情度之知其必出於此無疑矣其遷廟一節鄭氏用榖梁練而壊廟之說杜氏用賈逵服䖍說則以三年為斷其間同異得失雖未有考然榖梁但言壊舊廟不言遷新主則安知其非於練而遷舊主於三年而納新主耶至於禮疏所解鄭氏說但據周禮廟用卣一句亦非明驗故區區之意竊疑杜氏之說為合於人情也來諭考證雖詳其大概以為既吉則不可復凶既神事之則不可復以事生之禮接爾竊恐如此非惟未嘗深考古人吉凶變革之漸而亦未暇反求於孝子慈孫深愛至痛之情也至謂古者几筵不終喪而力詆鄭杜之非此尤未敢聞命據禮小斂有席至虞而後有几筵但卒哭而後不復饋食於下室耳古今異宜禮文之變亦有未可深考者然周禮自虞至祔曾不旬日不應方設而遽徹之如此其速也又謂終喪徹几筵不聞有入廟之說亦非也諸侯三年喪畢之祭魯謂之吉禘晉謂之禘祀禮疏謂之特禘者是也但其禮亡而士大夫以下則又不可考耳夫今之禮文其殘闕者多矣豈可以其偶失此文而遽謂無此禮耶又謂壊廟則變昭穆之位亦非也據禮家說昭常為昭穆常為穆故書謂文王為穆考詩謂武王為昭考至左傳猶謂畢原酆郇為文之昭邘晉應韓為武之穆則昭穆之位豈以新主祔廟而可變哉但昭主祔廟則二昭遞遷穆主祔廟則二穆遞遷爾此非今者所論之急但謾言之以見來說考之未精類此又謂古者每代異廟故有祔於祖父祖姑之禮今同一室則不當専祔於一人此則為合於人情矣然伊川先生嘗譏關中學禮者有役文之弊而吕與叔以守經信古學者庶幾無過而已義起之事正在盛徳者行之然則此等苟無大害於義理不若且依舊說亦夫子存羊愛禮之意也某於禮經不熟而考證亦未及精且以愚意論之如此不審髙明以為如何然亦不特如此某常以為大凡讀書處事當煩亂疑惑之際正當虚心博采以求至當或未有得亦當且以闕疑闕殆之意處之若遽以已所粗通之一說而盡廢已所未究之衆論則非惟所處之得失或未可知而此心之量亦不宏矣間并及之幸恕狂妄文集子夀答陸或問設如母卒父在父要循俗制喪服用僧道火化則如何曰公如何曰只得不從曰其他都是皮毛外事若决如此做從之也無妨若火化則不可泳曰火化則是殘父母之遺骸曰此語若將與喪服浮屠一道說便是未識輕重在語類錄胡泳伯謨問某人家欲除服而未葬除之則魂魄無所依不可祔廟曰不可如何不早葬葬何所費只是悠悠因語莆人葬只是於馬鬛上大可憂須是懸棺而葬語類鄭可學録問一之寄問誌石之制在士庶當如何題温公謂當書姓名恐所未安夫婦合葬者所題之辭又當如何曰宋故進士或云處士某君夫人某氏之墓下畧記名字鄉里年歳子孫及葬之年月又問一之卜以三月半葬併改葬前妣祔於先塋以前妣與其先丈合為一封土而以繼妣少間數歩又别為一封與朋友議以神道尊右而欲二妣皆列於先塋之左不審是否然程子葬穴圖又以昭居左而穆居右而廟制亦左昭右穆此意何也曰一之所處得之昭穆但分世數不為分尊卑如父為穆則子為昭又豈可以尊卑論乎周室廟制太王文王為穆王季武王為昭此可考也又問明器亦君子不死其親之意曰某家不曾用文集安卿答陳人家墓壙棺槨切不可太大當使壙僅能容槨槨僅能容棺乃善去年此間陳家墳墓遭發掘者皆緣壙中太濶其不能發者皆是壙中狹小無著脚乎處此不可不知也又此間墳墓山脚低卸故盗易入問墳與墓何别曰墓想是塋域墳即土封隆起者光武紀云為墳但取其稍髙四邊能走水足矣古人墳極髙大壙中容得人行也没意思法令一品以上墳得一丈二尺亦是儘髙矣守約云墳墓所以遭發掘者亦隂陽家之說有以啟之蓋凡發掘者皆以葬淺之故若深一二丈自無此患古禮葬亦許深曰不然深葬有水嘗見興化漳泉間墳墓甚髙問之則曰棺只浮在土上深者僅有一半入地半在地上所以不得不髙其封後來見福州人舉移舊墳稍深者無不有水方知興化漳泉淺葬者蓋防水爾北方地土深厚深塟不妨豈可同也問槨外可用炭灰雜沙土否曰只純用炭末置之槨外槨内實以和沙石灰或曰可純用灰否曰純灰恐不實須雜以篩過沙乆之沙灰相乳入其堅如石槨外四圍上下一切實以灰术約厚七八寸許既辟濕氣免水患又截樹根不入樹根遇炭皆生轉去以此見炭灰之妙蓋炭是死物無情故樹根不入也抱朴子曰炭入地千年不變問范家用黄泥拌石灰實槨外如何曰不可黄泥乆之亦能引樹根又問古人用瀝青恐地氣蒸熱瀝青溶化棺有偏陷却不便曰不曾親見用瀝青利害但書傳間多言用者不知如何語類錄沈僴問某舊聞風水之說斷然無之比因謀葬先人周旋思慮不敢輕置既以審諸己又以詢諸人既葬之後畧聞或者以為塋竁坐向少有未安便覺惕然不安乃知人子之喪親盡心擇地以求亡者之安亦未為害然世俗之人但從時師之說専以避凶趨吉為心既擇地之形勢又擇年月日時之吉凶遂致踰時不葬某竊謂程先生所謂道路窰井之類固不可不避土色生物之美固不可不擇然欲盡人子之心則再求衆山拱揖水泉環繞藏風聚氣之地至於擇日則於三日中選之至事辦之辰更以决之卜筮某山不吉某水不吉既得山水拱揖環繞於前又考其來去之吉凶雖已脗合又必須年月日時之皆合其說則恐不必如此不知然否曰伊川先生力破俗說然亦自言須是風順地厚之處乃可然則亦須稍有形勢拱揖環抱無空闕處乃可用也但不用某山某水之說耳又問某昨者營葬之時結屋數椽於先壠之西既塟後與諸弟常居其間庶得朝夕展省且免在家人事混雜敬子以為主喪者既塟當居家蓋神已歸家則家為重若念不能忘却令弟軰宿墓時一展省可也程先生論古人直是誠實處最可觀又以質之舜云廬墓一節不合聖賢之制切不須為之某既聞此二說不欲更遂初志日即則在家間中門外别室更常令一二弟居宿墳菴某時一展省未知可否曰墳土未乾時一展省何害於事但不須立廬墓之名耳文集伯量答胡隂陽家說前軰所言固為正論然恐幽明之故有所未盡故不敢從然今亦不須深考其書但道路所經耳目所接有數里無人烟處有欲住者亦住不得其成聚落有宅舍處便須山水環合畧成氣象然則欲掩藏其父祖安處其子孫者亦豈可都不揀擇以為乆逺安寧之慮而率意為之乎但不當極意過求必為富貴利達之計耳此等事自有酌中恰好處便是正理世俗固為不及而必為髙論者似亦過之也文集敬甫答孫喪塟之時只當以素食待客祭饌葷食只可分與僕役語類孫錄葉賀問服父母之喪而祭祀祖先當衣何服與居母喪而見父居父母喪而見祖父母其朔旦歳節上夀為禮各衣何服父母在而遭所生喪謂所出母不知合衣何服合與不合設几筵出聲哭舅姑俱存而子婦丁其父母憂雖合奔喪然卒哭後必當復歸恐三年之服自不可改遇節序變遷不審可以發哀出聲否見舅姑及從舅姑以祭不知所易當何服乞賜垂誨曰古者居喪三年不祭見曾子問其見祖父母之屬古人亦有節文不盡記然上夀之禮自不合與所生父母喪禮律亦有明文更宜詳考亦當稍避尊者乃為安耳如女己適人為父母服期禮律亦甚明若有舅姑難以發哀於其側從祭但畧去華盛之服可也文集叔重答董問王制喪三年不祭惟天地社稷越紼而行事鄭氏不解不祭之義按吕博士云人事之重莫甚於哀死故有喪者之毁如不欲生大功之喪業猶可廢喪不貳事如此則祭雖至重亦有所不行蓋祭而誠至則忘哀祭而誠不至則不如不祭之為愈後世哀死不如古人之隆故多疑於此鄭氏解惟祭天地社稷云不以卑廢尊也愚謂此說非是按天子諸侯之喪所不祭者惟宗廟耳郊社五祀皆不廢也天地可言尊於宗廟五祀社稷不尊於宗廟也但内事用情故宗廟雖尊而有所不行外事由文故社稷五祀不可廢其祭曾子問疏所謂外神不可以己私喪久廢其祭其說優於鄭氏矣内事用情者以子孫哀戚之情推祖考之心知其必有所不安於此曾子問篇曰天子崩國君薨祝取羣廟之土而藏諸祖廟鄭氏註曰象有凶者聚也愚謂此葢示與子孫同憂之意而子孫之於祖考至敬不文又不可使人攝事必也親之則衰麤不可以臨祭又不可以釋衰而吉服徇情而禮廢亦明矣外事由文者有國家者百神爾主天子之於天地諸侯之於社稷大夫之於五祀皆禮文之不可已者非若子孫之於祖考也以文為尚故不得以私喪乆廢其祭而其祭之也必以吉禮吉服故不得已隨其輕重而使人攝焉期於無廢其文而已哀戚方深交神之意有所不至不得已也以文而行其亦禮之稱乎又曾子問天子崩殯天子七日而殯五祀之祭不行哀戚方甚故不祭既殯而祭疏曰五祀外神不可以己私喪乆廢其祭故既殯哀情稍殺而後祭也其祭也尸入三飯不侑酳不酢而已矣不備禮也自啟將塟啟殯至於反哭既塟而反五祀之祭不行啟殯見柩哀情益深故亦不祭已塟而祭義同既塟祝畢獻而已也未純吉也鄭氏曰郊亦然社亦然唯嘗禘宗廟俟吉也諸侯自薨至殯諸侯五日而殯自啟至於反哭奉帥天子如天子之禮也左傳僖公三十三年凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟杜氏注謂此天子諸侯之禮不通於卿大夫葢卒哭後特用喪禮祀新死者於寢而宗廟四時嘗祭自如舊也此與禮記不同釋例又引晉三月而塟悼公改服修官蒸於曲沃㑹於溴梁之事為驗戰國禮變如此葢三年之喪諸侯莫之行乆矣左傳特記一時之事而杜氏乃誤為正禮也右三條皆非士大夫之制然其禮有可得而推者古大夫宗廟有五祀推外事由文之意則五祀惟自卒至殯自啟至於反哭暫廢既塟殯則使家臣攝之推内事用情之理則宗廟之祭宜亦廢也今人家無五祀惟享先一事遭喪而廢蓋無疑矣曰在喪廢祭古禮可考者如此但古人居喪衰麻之衣不釋於身哭泣之聲不絶於口其出入居處言語飲食皆與平日絶異故宗廟之祭雖廢而幽明之間兩無憾焉今人居喪與古人異卒哭之後遂墨其衰凡出入居處言語飲食與平日之所為皆不廢也而獨廢此一事恐亦有所未安竊謂欲處此義者但當自省所以居喪之禮果能始卒一合於古禮即廢祭無可疑若他時不免墨衰出入或其他有所未合者尚多即卒哭之前不得已準禮且廢卒哭之後可以畧放左傳杜注之説遇四時祭日以衰服特祀於几筵用墨衰常祀於家廟可也左傳之意卒哭前亦廢祭也但卒哭之期須既塟立主三虞之後卜日而祭以成事方可耳温公髙氏二書載此節文甚詳可以熟考若神柩在而欲以百日為斷墨衰出入則決然不可愚見如此不知伯崇以為如何然主奉喪祭乃令兄職此事非伯崇所得専但以此儀從容咨講更與知禮者評之庶其聽則可矣萬一有所不合則某聞之喪與甚哀不足而禮有餘不若禮不足而哀有餘夫子亦言喪與其易也寧戚某常解此義以為具文備禮而非致慤焉之為易今人多此病試思之此則伯崇所當勉也更思之文集伯崇答范越紼之說註雖簡疏必詳此等可自檢看居喪不祭伊川横渠各有說若論今日人家所行則不合禮處自多難以一概論若用韓魏公法則有時祭有節祠時祭禮繁非居喪者所能行節祠則其禮甚簡雖以墨縗行事亦無不可也喪禮自塟以前皆謂之奠其禮甚簡蓋哀不能文而於新死者亦未忍遽以鬼神之禮事之也自虞以後方謂之祭故禮家又謂奠為喪祭而虞為吉祭蓋漸趨於吉也酹酒有兩說一用鬱鬯灌地以降神則唯天子諸侯之禮有之今其書亡不可深考一是祭酒蓋古者飲食必祭人以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知文集時亨答嚴親喪兄弟先滿者先除服後滿者後除以在外聞喪有先後者語類錄包揚問按禮居喪不弔其送塟雖無明文然執紼即是執事禮亦有妨鄉俗不特往弔送喪凡親舊家有吉凶之事皆有所遺不知處此當如何曰吉禮固不可預然弔送之禮却似不可廢所謂禮從宜者此也文集伯答胡量問改塟緦鄭氏以為終緦之月數而除服王肅以為塟畢便除如何曰如今不可考禮宜從厚當如鄭氏問王肅以為既虞而除之若是改塟神已在廟乆矣何得虞乎曰便是如此而今都不可考看來也須當反哭於廟問鄭氏以為只是有三年服者改塟服緦三月非三年服者弔服加麻塟畢除之否曰然子思曰禮父母改塟緦而除則非父母不服緦也語類孫錄葉賀所喻庶母之名亦未正庶母自謂父妾生子者士服緦麻而大夫無服若母則儀禮有公子為其母之文今令甲其下亦明有注字曰謂生己者則是不問父妻父妾而皆得母名矣故注中則有嫡母之文又以明生己者之正為母也至如封敘封贈亦但謂之所生母而不謂之庶母也通典之說未暇檢但以公子為母練冠麻衣既塟除之為比則承宗廟社稷之重者恐不得為父所生之祖母者持重矣更俟病間續考奉報文集守約答李問周制有大宗之禮乃有立適之義立適以為後故父為長子權其重者若然今大宗之禮廢無立適之法而子各得以為後則長子少子當為不異庶子不得為長子三年者不必然也父為長子三年者亦不可以適庶論也曰宗子雖未能立然服制自當從古是亦愛禮存羊之意不可妄有改易也如漢時宗子法已廢然其詔令猶云賜民當為父後者爵一級是此禮意猶在也豈可謂宗法廢而諸子皆得為父後乎文集子從答郭問嫡子已娶無子而没或者以為母在宜用尊厭之例不須備禮曰宗子成人而無子當為之立後尊厭之說非是又問嫡子死而無後當誰主其喪曰若已立後則無此疑矣文集孝述答李先生塟長子喪儀銘旌埋銘魂轎柩只用紫蓋盡去繁文埋銘石二片各長四尺濶二尺許止記姓名歳月居里刻訖以字面相合以鐵束之置於壙上其壙用石上蓋厚一尺許五六叚横凑之兩旁及底五寸許内外皆用石灰雜炭末細沙黄泥築之語類孫錄葉賀問親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪恐亦有礙開元禮除喪之後束帶相見不行初昬之禮趨喪後事皆不言之何也曰趨喪之後男居外次女居内次自不相見除喪而後束帶相見於是而始入御開元之制必有所据矣文集答郭子從問親迎男女遭喪之禮曾子問之詳矣今有男就成於女家乆而未歸若壻之父母死女之奔喪如之何若女之父母死其女之制服如之何曰此乃原頭不是且倣在塗之禮行之可也然既嫁則服自當降既除而歸夫家耳文集味道答葉問曾子問曰昬禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻父母死則女之家亦使人弔云云如未有吉日獨不當弔乎曰恐無不弔之理文集味道答葉問取女有吉日而女死如之何孔子曰壻齊衰而弔既塟而除之夫死亦如之服用斬衰恐今亦難行也曰未見難行處但人自不肯行耳文集子從答郭問古者父在子為母期夫為妻期其練祥禫之祭皆同今制夫為妻服與古同而子為母齊衰三年則夫為妻大祥之日乃子為母小祥之祭矣至於子為母大祥及禫夫已無服其祭當如何恐只是夫為祭主其辭曰夫某為子某薦其祥事如曾子問宗子為介子之禮不識可否曰今禮几筵必三年而除則小祥大祥之祭皆夫主之但小祥之後夫即釋服大祥之祭夫亦恐須素服如弔服可也以祭但改其祝詞亦不必言為子而祭也又問父在母没父既除期之喪子尚為母服其見父之時當以何服曰此於禮無文但問喪有父在不杖之説可更檢疏議參訂之文集文卿答竇喻及喪禮踰期主祭之疑此未有可考但司馬氏大小祥祭已除服者皆與祭則主祭者雖已除服亦何害於主祭乎但不可純用吉服須畧如弔服或忌日之服可也更告博詢深於禮者議之文集明仲答陳問程氏主式士人家可用否曰他云已是殺諸侯之制士人家用牌子曰牌子式當如何曰温公用大板子今但依程氏古式而勿陷其中可也語類錄陳淳問凡題主男子婦人無官稱者宜何書曰伊川主式已詳言之可考也又問夫在妻之神主宜何書何人奉祀若用夫則題嬪某氏神主旁注夫某奉祀否夫祭妻而云奉祀莫太尊否曰旁注施於所尊以下則不必書也文集文卿答竇主式乃伊川先生所制初非朝廷立法固無官品之限萬一繼世無官亦難遽易但繼此不當作耳有官人自作主不妨牌子亦無定制竊意亦須似主之大小髙下但不為判合陷中可也凡此皆是後賢義起之制今復以意斟酌如此若古禮則未有考也文集光祖答曾黄文問從母之夫舅之妻皆無服何也曰先王制禮父族四故由父而上為從曾祖服緦麻姑之子姊妹之子女子之子皆有服皆由父而推之故也母族三母之父母之母母之兄弟恩止於舅故從母之夫舅之妻皆不為服推不去故也妻族二妻之父妻之母乍看時似乎雜亂無紀仔細看則皆有義存焉又言吕與叔集中一婦人墓誌言凡遇功緦之喪皆蔬食終其月此可為法又言生布加碾治者為功語類子錄李方朱子禮纂卷三
