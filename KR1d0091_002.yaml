body:
  text: 朱子禮纂卷二大學士李光地撰冠昏問冠昏之禮如欲行之當須使冠昏之人易曉其言乃為有益如三加之辭出門之戒若只以古語告之彼將謂何曰只以今之俗語告之使之易曉乃佳語類潘時舉録問士冠禮有所謂始加再加三加如何曰所謂三加彌尊只是三次加初是緇布冠以粗布為之次皮辨次爵辨諸家皆作畫爵看來亦只是皮辨模樣皆以白皮為之緇布冠古來有之初是布冠齊則緇之次皮辨者只是朝服爵辨士之祭服周禮爵辨居五冕之下又問致美乎黻冕注皆言祭服也黻冕恐不全是祭服否曰祭服謂之黻冕朝服謂之韠如詩鞞琫有珌內則端鞞紳皆是問士冠禮一加再加言吉月令月至三加言以歲之正不知是同時否曰只是一時節行此文自如此説加緇布冠少頃又更加皮辨少頃又更加爵辨然後成禮如溫公冠禮亦做此初裹巾次帽次幞頭語類録徐宇問喪祭之禮今之士固難行而冠昏自行可乎曰亦自可行某今所定者前一截依溫公後一截依伊川昏禮事屬兩家恐未必信禮恐或難行若冠禮是自家屋裏事却易行向見南軒説冠禮難行某云是自家屋裏事關了門將巾冠與子弟戴有甚難又云昏禮廟見舅姑之亡者而不及祖蓋古者宗子法行非宗子之家不可别立祖廟故但有禰廟今只共廟如何只見禰而不見祖此當以義起亦見祖可也問必待三月如何曰今若既歸來直待三月又似太久古人直是至此方見可以為婦及不可為婦此後方反馬馬是婦初歸時所乘車至此方送還母家語類孫録葉賀問昏禮用鴈壻執鴈或謂取其不再偶或謂取其順隂陽往來之義曰士昏禮謂之攝盛蓋以士而服大夫之服爵辨乘大夫之車墨車則當執大夫之贄前説恐傅會又曰重其禮而盛其服語類録林賜親迎之禮從伊川之説為是近則迎於國逺則迎於其館語類祖録李閎問程氏昏儀與溫公儀如何曰互有得失曰當以何為主曰迎婦以前溫公底是婦入門以後程儀是溫公儀親迎只拜妻之父兩拜便受婦以行却是程儀遍見妻之黨則不是溫公儀入門便廟見不是程儀未廟見却是大概只此兩條以此為準去子細看曰廟見當以何日曰古人三月而後見曰何必待三月曰未知得婦人性行如何三月之久則婦儀亦熟方成婦矣然今也不能到三月只做箇節次如此曰古人納采後又納吉若卜不吉則如何曰便休也曰古人納幣五兩只五匹耳恐太簡難行否曰計繁簡則是以利言矣且吾儕無望於復古則風俗更教誰變曰溫公用鹿皮如何曰大節是了小小不能皆然亦沒緊要曰溫公婦見舅姑及舅姑享婦儀是否曰亦是古人有此禮語類録陳淳人著書只是自入些已意便做病痛司馬與伊川定昏禮都是依儀禮只是各改了一處便不是古人意司馬禮云親迎奠鴈見主昏者即出不先見妻父母者以婦未見舅姑也是古禮如此伊川却教拜了又入堂拜大男小女這不是伊川云壻迎婦既至即揖入內次日見舅姑三月而廟見是古禮司馬禮却説婦入門即拜影堂這又不是古人初未成婦次日方見舅姑蓋先得於夫方可見舅姑到兩三月得舅姑意了舅姑方令見祖廟某思量今亦不能三月之久亦須第二日見舅姑第三日廟見乃安亦當行親迎之禮古者天子必無親至后家之禮今妻家逺要行禮一則令妻家就近處設一處却就彼往迎歸館成禮一則妻家出至一處壻即就彼迎歸自家成禮語類孫録葉賀問昏禮不賀人之序也曰婦既歸姑與之為禮喜於家事之有承替也姑反置酒一分以勸飲婦姑坐客位而婦坐主位姑降自西階婦降自阼階語類録黃卓朱子禮纂卷二
