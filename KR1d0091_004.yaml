body:
  text: 朱子禮纂卷四大學士李光地撰祭問陽魂為神陰魄為鬼祭義曰氣也者神之盛也魄也者鬼之盛也而鄭氏曰氣嘘吸出入者也耳目之聰明為魄然則陰陽未可言鬼神陰陽之靈乃鬼神也如何曰魄者形之神魂者氣之神魂魄是形氣之精英謂之靈故張子曰二氣之良能二氣即陰陽也良能是其靈處問眼體也眼之光為魄耳體也何以為耳之魄曰能聽者便是如鼻之知臭舌之知味皆是但不可以知字為魄纔説知便是主於心也心但能知若甘苦鹹淡要從舌上過如老人耳重目昏便是魄漸要散潘問魄附於體氣附於魂可作如此㸔否曰也不是附魂魄是形氣之精英銖問陽主伸陰主屈鬼神陰陽之靈不過指一氣之屈伸往來者而言耳天地之間陰陽合散何物不有所以錯綜㸔得曰固是今且説大界限則周禮言天曰神地曰祇人曰鬼三者皆有神而天獨曰神者以其常常流動不息故專以神言之若人亦自有神但在人身上則謂之神散則謂之鬼耳鬼是散而靜了更無形故曰往而不返又問子思只舉齊明盛服以下數語發明體物而不可遺之驗只是舉神之著者而言何以不言鬼曰鬼是散而靜更無形故不必言神是發見此是鬼之神如人祖考氣散為鬼矣子孫精誠以格之則洋洋如在其上如在其左右豈非鬼之神耶語類錄黄銖問氣也者神之盛也魄也者鬼之盛也豈非以氣魄未足為鬼神氣魄之盛者乃為鬼神否曰非也大凡説鬼神皆是通生死而言此言盛者則是指生人身上而言所以後面説骨肉斃於下陰為野土但説體不説魄也問頃聞先生言耳目之精明者為魄口鼻之嘘吸者為魂以此語是而未盡耳目之所以能精明者為魄口鼻之所以能嘘吸者為魂是否曰然㸔來魄有箇物事形象在裏面恐如水晶相似所以發出來為耳目之精明且如月其黒暈是魄也其光是魂也想見人身魂魄也是如此人生時魂魄相交死則離而各散去魂為陽而散上魄為陰而降下又曰陰主藏受陽主運用凡能記憶皆魄之所藏受也至於運用發出來是魂這兩箇物事本不相離他能記憶底是魄然發出來底便是魂能知覺底是魄然知覺發出來底又是魂雖各自分屬陰陽然陰陽中又各自有陰陽也或曰大率魄屬形體魂屬精神曰精又是魄神又是魂又曰魄盛則耳目聰明能記憶所以老人多目昏耳聵記事不得便是魄衰而少也老子云載營魄是以魂守魄蓋魂熱而魄冷魂動而魄靜能以魂守魄則魂以所守而亦靜魄以魂而有生意魂之熱而生涼魄之冷而生暖惟二者不相離故其陽不燥其陰不滯而得其和矣不然則魂愈動而魄愈靜魂愈熱而魄愈冷二者相離則不得其和而死矣又云水一也火二也以魂載魄以二守一則水火既濟而不相離所以能永年也養生家説盡千言萬語説龍説虎説鉛説汞説坎説離其術止是如此而已故云載魄抱魂能勿離乎專氣致柔能如嬰兒乎今之道家只是馳騖於外安識所謂載魄守一能勿離乎康節云老子得易之體孟子得易之用康節之學意思微似莊老或曰老子以其不能發用否曰老子只是要收藏不放散語類錄吕燾問祖考之精神便是自家之精神故祭之可以來格至於妻及外親則不知如何曰但所當祭者其精神魂魄無不感通蓋本是從一原中流出初無間隔雖天地山川鬼神亦然也文集長孺答汪如今士大夫家都要理會古禮今天下有二件極大底事恁地循襲其一是天地同祭於南郊其一是太祖不特立廟而與諸祖同一廟自東漢以來如此又錄云千五六百年無人整理子謂為芻靈也善謂為俑者不仁雖是前代已用物事到不是處也須改用教是始得語類孫葉賀錄如今郊禮合祭天地周禮有圜丘方澤之説後來人却只説地便是后土見於書傳言郊社多矣某㸔來不要如此也自還有方澤之祭但周禮其他處又都不説亦未可曉語類之錄錢木某按社實山林川澤丘陵墳衍原隰五土之祇而后土勾龍氏其配也稷則專為原隰之祇能生五穀者而后稷周棄氏其配也風師箕也雨師畢也是皆著於周禮領於大宗伯之官惟社稷自天子之都至於國里通得祭而風雨之神則自唐以來諸郡始得祀焉至於雷神則又唐制所與雨師同壇共牲而祀者也國朝禮文大抵多襲唐故故今郡國祀典自先聖先師之外惟是五者蓋以為二氣之良能天地之功用流行於覆載之間以育萬物而民生賴焉者其德惟此為尤盛是以於其壇壝時日之制牲幣器服之品降登饋奠之節莫不參訂討論著之禮象頒下郡國藏於禮官有司歲舉行之而部刺史又當以時循行察其不如法者蓋有國家者所以昭事明神祈以降祥錫福於下其勤如此顧今之為吏者所知不過簿書期會之間否則觴豆舞歌相與放焉而不知反其所敬畏崇飾而神事之者非老子釋氏之祠則妖妄淫昬之鬼而已其於先王之制國家之典所以治人事神者易嘗有概於其心哉嗚呼人心之不正風俗之不厚年榖之不登民生之不遂其不亦以此歟今羅侯之與劉君乃能相與汲汲乎此非其學古愛民之志卓然有見乎流俗見聞之表其孰能之文集社鄂州稷壇記堯卿問社主平時藏在何處曰向來沙隨説以所宜木刻而為主某嘗辨之後來覺得却是但以所宜木為主如今世俗神樹模樣非是將木來截作主也以木名社如櫟社枌榆社之類又問社稷神曰説得不同或云稷是山林原隰之神或云是穀神㸔來穀神較是社是土神又問社何以有神曰能生物便是神也又曰周禮亡國之神却用刑人為尸一部周禮却是㸔得天理爛熟也語類孫錄林䕫叔器問五祀祭行之義曰行堂塗也古人無廊屋只於堂階下取兩條路五祀雖分四時祭然出則獨祭行及出門又有一祭作兩小山於門前烹狗置之山上祭畢却就山邊喫却推車從兩山間過蓋取跋履山川之義舜功問祭五祀想也只是當如此致敬未必有此神曰神也者妙萬物而言者也盈天地之間皆神若説五祀無神則是有有神處有無神處是甚麽道理叔器問天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先此是分當如此否曰也是氣與他相關如天子則是天地之主便祭得那天地若似其他人與他不相關復祭箇甚麽如諸侯祭山川也只祭得境内底如楚昭王病後卜云河為祟諸大夫欲祭河昭王自言楚之分地不及於河河非所以為祟孔子所以美之云昭王之不失國也宜哉這便見得境外山川與我不相關自不當祭又問如殺孝婦天為之旱如何曰這自是他一人足以感動天地若祭祀則分與他不相關如何祭得又問人而今去燒香拜天之類恐也不是曰天只在我更禱箇甚麽一身之中凡所思慮運動無非是天一身在天裏行如魚在水裏滿肚裏都是水某説人家還醮無意思豈有斟一盃酒盛兩箇餅要享上帝且説有此理無此理某在南康祈雨每日去天慶觀燒香某説且慢去今若有箇人不經州縣便去天子那裏下狀時你嫌他不嫌他你須捉來打不合越訴而今祈雨却如何不祭境内山川如何便去告上帝語類剛錄黄義問后土氏之祭曰極而言之亦似僭然此即古人中霤之祭而今之所謂土地者郊特牲取財於地取法於天是以尊天而親地教民美報焉故家主中霤而國主社觀此則天不可祭而土神在民亦可祭蓋自上古陶為土室其當中處上為一竅以通明名之曰中霤及中古有宫室亦以室之中央為中霤存古之舊示不忘本雖曰土神而只以小者言之非如天子所謂祭皇天后土之大者也語類剛錄黄義室中西南隅乃主位室中西牖東户若宣聖廟室則先聖當東向先師南向如周人禘嚳郊稷嚳東向稷南向今朝廷宗廟之禮情文都自相悖不曉得古者主位東向配位南向故拜即望西今既一列皆南向到拜時亦却望西拜都自相背古者用籩豆簠簋等陳於地當時只席地而坐故如此飲食為便今塑像髙髙在上而祭饌反陳於地情文全不相稱曩者某人來問白鹿塑像某答以州縣學是天子所立既元用像不可更書院自不宜如此不如不塑像某處有列子廟却塑列子膝坐于地這必有古像行古禮須是參用今來日用常禮庶或饗之如太祖祭用簠簋籩豆之外又設牙盤食用椀楪之類陳於牀這也有意思到神宗時廢了元祐初復用後來變元祐之政故此亦遂廢語類孫錄葉賀夫子像設置於椅上已不是又復置在臺座上到春秋釋奠却乃陳簠簋籩豆於地是甚義理某幾番説要塑宣聖坐於地上如設席模樣祭時却自席地此有甚不可處每説與人都道差異不知如何某記在南康欲於學中整頓宣聖不能得後説與交代云云宣聖本不當設像春秋時祭只設主祭可也今不可行只得設像坐於地方始是禮語類錄徐㝢新書院告成明日欲祀先聖先師古有釋菜之禮約而可行遂檢五禮新儀令具其要者以呈先生終日董役夜歸即與諸生斟酌禮儀鷄鳴起平明往書院以㕔事未備就講堂行禮宣聖像居中兖國公顔氏郕侯曾氏沂水侯孔氏鄒國公孟氏西向配北上竝紙牌子濂溪周先生東一明道程先生西一伊川程先生柬二康節邵先生西二司馬温國文正公柬三横渠張先生西三延平李先生東四從祀亦紙牌子竝設於地祭儀别錄祝文别錄先生為獻官命賀孫為贊直卿居甫分奠叔蒙贊敬之掌儀堂狹地潤頗有失儀但獻官極其誠意如或享之鄰曲長幼竝來陪禮畢先生揖賓坐賓再起請先生就中位開講先生以坐中多年老不敢居中位再辭不獲諸生復請遂就位説為學之要午飯後集衆賓飲至暮散語類孫錄葉賀王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭説恐非顔師古曰父為昭子為穆孫復為昭昭明也穆美也後以晉室諱昭故學者改昭為韶其制皆為中門外之左外為都宫内各有寝廟别有門垣太祖在北左昭右穆以次而南晉博士孫毓議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之宫鄭氏曰遠廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏于文武之廟羣穆於文羣昭於武明堂位有文世室武世室鄭氏曰世室者不毁之名也二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主於昭之宗曾祖遷於昭之二新入廟者祔於昭之三而髙祖及祖在穆如故穆廟親盡倣此新死者如當為昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曾祖自次廟遷其髙祖於昭之世室蓋於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為髙祖其近廟於主祭者為祖也主祭者殁則祔於穆之近廟而遞遷其上倣此凡毁廟遷主改塗易檐示有所變非盡毁也見穀梁傳及注諸侯則無二宗大夫則無二廟其遷毁之次則與天子同傳毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔于祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸鄭氏曰以孫與祖昭穆同也周制自后稷為太祖不窋為昭鞠為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王復為昭故書稱文王為穆考詩稱武王為昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也邘晉應韓武之穆也蓋其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右為尊卑也三代之制其詳雖不得聞然其大畧不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得為與漢亦無甚異未詳其説貢禹韋元成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制見後漢明帝紀祭祀志志又云其後積多無别而顯宗但為陵寢之號自是以來更歴魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壯麗而没祭一室不過尋丈之間甚或無地以容鼎俎而陰損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典蓋將以遠迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之説亦未有定論獨原廟之制外為都宫而各為寢廟門坦乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧于七廟之室而為祠于佛老之側不為木主而為之象不為禘祫烝嘗之祀而行一酌奠之禮楊時所謂舎二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所安也不議復此而徒欲廢彼亦安得為至當之論哉韋元成劉歆廟數不同班固以歆説為是今亦未能決其是非姑兩存之至於遷毁之序則昭常為昭穆常為穆假令新死者當祔昭廟則毁其髙祖之廟而祔其主於左祧遷其祖之主於髙祖之故廟而祔新死者於祖之故廟即當祔於穆者其序亦然蓋祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動故虞之明日祔於祖父蓋將代居其處故為之祭以告新舊之神也今以周室世次為圖如右所謂髙祖以上親盡當毁虞之明日祔於祖父者也元豐議禮何洵直張璪以此為説而陸佃非之曰昭穆者父子之號昭以明下為義穆以恭上為義方其為父則稱昭取其昭以明下也方其為子則稱穆取其穆以恭上也豈可膠哉壇立於右墠立於左以周制言之則太王親盡去右壇而為墠王季親盡去左祧而為壇左右遷徙無嫌又曰顯考王考廟與左祧為昭皇考考廟與右祧為穆如曰成王之世武王為昭文王為穆則武不入考廟而入王考廟矣此皆為説之誤殊不知昭穆本以廟之居東居西主之向南向北而得名初不為父子之號也必曰父子之號則穆之子又安可復為昭哉壇墠之左右亦出先儒一時之説禮經非有明文也政使果然亦為去廟之後主藏夾室而有禱之祭且壇墠又皆一而已昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆而可以各由其序而遞遷也又況昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也故成王之世文王為穆而不害其尊於武武王為昭而不害其卑於文非謂之昭即為王考謂之穆即為考廟也且必如佃説新死者必入穆廟而自父以上穆遷於昭昭遷於穆祔一神而六廟皆為之動則於其祔也又何不直祔於父而必隔越一世以祔於其所未應入之廟乎佃又言曰假令甲於上世之次為穆今合堂同食實屬父行乙於上世之次為昭今合堂同食實屬子行則甲宜為昭乙宜為穆豈可遠引千歲以來世次覆令甲為右穆乙為左昭以紊父子之序乎此亦不曉前説之過也蓋昭穆之次既定則其子孫亦以為序禮所謂昭與昭齒穆與穆齒傳所謂太王之昭王季之穆文之昭武之穆者是也如必以父為昭而子為穆則太伯虞仲乃太王之父而文王反為管蔡魯衛之子矣而可乎哉且一昭穆也既有上世之次又有今世之次則所以序其子孫者無乃更易不定而徒為紛紛乎曰然則廟之遷次如圖可以見矣子孫之序如佃所駁得無真有難處者耶曰古人坐次或以西方為上或以南方為上未必以左為尊也且又安知不如時祫之位乎昭穆之不為尊卑説已前見其大祫則始封以下以次相承亦無差舛故張璪以為四時常祀各於其廟不偶坐而相臨故武王進居王季之位而不嫌尊於文王及合食乎祖則王季文王更為昭穆不可謂無尊卑之序者是也但四時之祫不兼毁廟之主則有右無昭而穆獨為尊之時若兩世室之主則文常為穆而武常為昭也故陸佃以為毁廟之主有不皆祫之時難之而未見璪之所以對也予竊以為以上世之次推之一昭一穆固有定次而其自相為偶亦不可易但其散居本廟各自為主而不相厭則武王進居王季之位而不嫌尊於文王及其合食於祖則王季雖遷而武王自當與成王為偶未可以遽進而居王季之處也文王之為穆亦虚其所向之位而已則雖北向而何害其為尊哉文集議禘祫宗廟南向堂室皆南向但室户在室南壁之東偏而南向牖在室南壁之西偏而南向故以室西南隅為奥而為尊者之居所謂宗室牖下也既以西南為尊者之位則室中之位固以東鄉為尊矣非謂廟東鄉而太祖東鄉也然亦非獨太祖也凡廟皆南鄉而本廟之主在其廟室中皆東鄉但祫祭於太廟之時則獨太祖不易其位而羣廟之主合食於前者皆南鄉北鄉以叙昭穆耳禘祭於太廟則又以所出之帝為東鄉而太祖反居南鄉為配位也通典開元禮釋奠先聖東向先師南向乃古禮也堂上之位則以南鄉為尊如儀禮鄉飲酒賓席牖前南向今沈存中説祭禮朝踐於堂亦以南鄉為尊而政和新儀亦有是説但未見所據之本文又秦漢間廣武君王陵母皆云東向坐田蚡傳亦云自坐東鄉而坐其兄南鄉此則不知其為室中為堂上但猶以東鄉為尊則可見矣文集子合答王李丈問太廟堂室之制曰古制是不可曉禮説士堂後一架為室蓋甚窄天子便待加得五七架亦窄狹不知周家三十以上神主位次相逼如何行禮室在堂後一間從堂内左角為户而入西壁如今之牆上為龕太祖居之東向旁兩壁有牖羣昭列於北牖下而南向羣穆列於南牖下而北向堂又不為神位而為人所行禮之地天子設黼扆於中受諸侯之朝語類陳淳錄臣竊見太祖皇帝受命之初未遑他事首尊四祖之廟而又以僖祖為四廟之首累聖尊崇罔敢夫墜中間雖以世數寖遠遷之夾室而未及數年議臣章衡復請尊奉以為太廟之始祖宰相王安石等遂奏以為本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今欲毁其廟而藏其主替祖宗之尊而下祔於子孫非所以順祖宗之孝心也於是神宗皇帝詔從其請而司馬光韓維孫朴孫固等以為非是力奏爭之其説甚詳然其立意不過以為太祖受命立極當為始祖而祫享東向僖祖初無功德親盡當祧而已臣嘗深考其説而以人心之所安者揆之則僖祖者太祖之髙祖考也雖歴世久遠功德無傳然四世之後篤生神孫順天應人以寧兆庶其為功德蓋不必身親為之然後為盛也是以太祖皇帝首崇立之以為初廟當此之時蓋已歸德於祖而不敢以功業自居矣今乃以欲尊太祖之故而必使之奪據僖祖初室東向之位臣恐在天之靈於此有所不忍而不敢當也安石之為人雖不若光等之賢而其論之正則有不可誣者世之論者不察於此但見太祖功德之盛而不知因太祖當日崇立僖祖之心以原其所自但見光等之賢非安石章衡之所及而不知反之於己以即夫心之所安是以紛紛多為異説臣嘗病其如此每恨無以正之不謂今者之來適逢此議而又以疾病之故不獲祗赴謹已畧具鄙見申尚書省乞與敷奏又訪得元祐大儒程頤所論深以安石之言為當貼説詳盡而所論并祧二祖止成八世之説尤為明白未知己未得達聖聽欲乞宣問詳賜覽觀并下此奏别令詳議以承太祖皇帝尊祖敬宗報本反始之意上延基祚下一民聽千萬幸甚取進止文集議狀祧廟問祧主當遷何地曰便是這事難處漢唐人多瘞於兩階之間然今人家廟亦無所謂兩階者兩階之間以其人跡不踏取其潔耳問各以昭穆瘞於祖宗之墳如何曰唐人亦有瘞於寢園者但今人墳墓又有太遠者恐難用耳頃在朝因僖祖之祧與諸公爭辨幾至喧忿後來因是去國不然亦必為人論逐當時全不曾商議只見智夫崇之時為太常卿來言欲祧僖祖某問欲祧之何所劉曰正未有以處因此方詔集議某論卒不合後來竟為别廟于太廟之側奉僖祖宣祖祧主藏之於别廟不知祫禘時如何這都行不得若禘祫太祖之廟不成教祖宗來就子孫之廟若移太祖之主合禘於别廟則太祖復不得正東向之位都行不得治平問曾如此祧了及至熙寧章衡上疏論僖祖不當祧想其論是主王介甫然其論甚正介甫嘗上疏云皇家僖祖正如周家之稷契皆為始祖百世不遷之廟今替其祀而使下祔於子孫之夾室非所謂事亡如事存事死如事生而順祖宗之孝心也此論甚正後來復僖祖之廟某當時之論正用介甫之意某謂僖祖當為始祖百世不遷之廟如周之后稷而太祖太宗則比周之文武有何不可而趙丞相一向不從當時如樓大防陳君舉謝深甫力主其説而彭子壽孫從之之徒又從而和之或云太祖取天下何與僖祖事某應之曰諸公身自取富貴致位通顯然則何用封贈父祖耶又許及之上疏云太祖皇帝開基而不得正東向之位雖三尺童子亦為之不平其鄙陋如此後來集議某度議必不合遂不曾與議却上一疏論其事趙丞相又執之不下某數問之亦不從後來歸家亦數寫書去問之何故不降出亦不從後已南遷而事定矣僖祖翼祖順祖宣祖中間嘗祧去翼祖所以不諱敬字得幾時及蔡京建立九廟遂復取還翼祖以足九廟之數後來渡江翼祖順祖廟已祧去若論廟數則自祧僖祖之外又宣祖以至孝廟方成九數乃并宣祖而祧之某嘗聞某人云快便難逢不如祧了且得一件事了其不恭敢如此某為之駭然語錄失名問祧禮曰天子諸侯有太廟夾室則祧主藏於其中今士人家無此祧主無可置處禮注説藏於兩階間今不得已只埋於墓所問有祭告否曰横渠説三年後祫祭於太廟因其祭畢還主之時遂奉祧主歸於夾室遷主新主皆歸於廟鄭氏周禮注大宗伯享先王處亦有此意今畧放而行之問考妣入廟有先後則祧以何時曰妣先未得入廟考入廟則祧語類剛錄黄義竊謂至和之制雖若不合於古而實得其意但有所未盡而已政和之制則雖稽於古者或得其數而失其意則多矣蓋古者諸侯五廟所謂二昭二穆者髙祖以下四世有服之親也所謂太祖者始封之君百世不毁之廟也今世公侯有家而無國則不得有太祖之廟矣故至和四廟特所謂二昭二穆四世有服之親而無太祖之廟其於古制雖若不同而實不害於得其意也又況古者天子之三公八命及其出封然後得用諸侯之禮蓋仕於王朝者其禮反有所厭而不得伸則今之公卿宜亦未得全用諸侯之禮也禮家又言夏四廟至子孫而五則是凡立五廟者亦是五世以後始封之君正東向之位然後得備其數非於今日立廟之初便立太祖之廟也政和之制蓋皆不考乎此故二昭二穆之上通數髙祖之父以備五世夫既非始封之君又已親盡而服絶矣乃苟以備夫五世而祀之於義何所當乎至於大夫三廟説者以為天子諸侯之大夫皆同蓋古者天子之大夫與諸侯之大夫品秩之數不甚相遠故其制可以如此若今之世則惟侍從官以上乃可以稱天子之大夫至諸侯之大夫則州鎮之幕職官而已爾横渠先生止為京官而温公云官比諸侯之大夫則已貴是安可以拘於古制而使用一等之禮哉故至和之制專以天子之大夫為法亦深得制禮之意但其自東宫三少而上乃得為大夫則疑未盡而適士二廟官師一廟之制亦有所未備焉耳政和之制固未必深考古者天子諸侯之大夫同為一等之説然其意實近之但自大侍從至陞朝官竝為一法則亦太無隆殺之辨矣蓋官職髙下則有古今之不同但以命數準今之品數而論之則禮之等差可得而定矣然此亦論其得失而已若欲行之則政和之禮行於今日未之有改凡仕於今日而得立廟者豈得而不用哉但其所謂廟者制度草略已不能如唐制之盛而況於古乎此好禮之士所以未嘗不歎息於斯也然考諸程子之言則以為髙祖有服不可不祭雖七廟五廟亦止於髙祖雖三廟一廟以至祭寢亦必及於髙祖但有疏數之不同耳疑此最為得祭祀之本意今以祭法考之雖未見祭必及髙祖之文然有月祭享嘗之别則古者祭祀以遠近為疏數亦可見矣禮家又言大夫有事省於其君干祫及其髙祖此則可為立三廟而祭及髙祖之騐而來教所疑私家合食之文亦因可見矣但干祫之制他未有可考耳文集尚書答汪問影堂序位曰古者一世自為一廟有門有堂有寢凡屋三重而牆四周焉自後漢以來乃為同堂異室之廟一世一室而以西為上如韓文中家廟碑有祭初室祭東室之語今國家亦只用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故温公諸家祭禮皆用以右為尊之説獨文潞公嘗立家廟今温公集中有碑載其制度頗詳亦是一世一室而以右為上自可檢㸔伊川之説亦誤昭穆之説則又甚長中庸或問中已詳言之更當細考大抵今士大夫家只當且以温公之法為定也文集子從答郭諸侯不得祖天子然魯有文王廟左氏亦云鄭祖厲王何也此必周衰諸侯僭肆做此違條礙法事故公廟設於私家語類大錄呉必春秋時宗法未亡如滕文公云吾宗國魯先君蓋滕文之昭也文王之子武王既為天子以次則周公為長故滕謂魯為宗國又如左氏傳載女喪而宗室於人何有如三桓之後公父文伯公鉏公為之類乃季氏之小宗南宫适之類孟氏之小宗今宗室中多帶皇兄皇叔皇伯等冠於官職之上非古者不得以戚戚君之意本朝王定國嘗言之欲令稱某王孫或曾孫或幾世孫有如越王派下則當云越王幾世孫如此則族屬易識且無戚君之嫌亦自好後來定國得罪反以此論為間離骨肉今宗室散無統紀名諱重叠字號都窮了更無安排處語類孫錄葉賀余正父謂士大夫不得祭始祖此天子諸侯之禮若士大夫當祭則自古無明文又云大夫自無太祖先生因舉春秋如單氏尹氏王朝之大夫自上世至後世皆不變其初來姓號則必有太祖又如季氏之徒世世不改其號則亦必有太祖余正父謂此春秋時自是世卿不由天子都没理會先生云非獨是春秋時如詩裏説南仲太祖太師皇父南仲是文王時人到宣王時為太祖不知古者世祿不世官之説如何又如周公之後伯禽已受封於魯而周家世有周公如春秋云宰周公這般所在自曉未得語類孫錄葉賀伊川時祭止於髙祖髙祖而上則於立春設二位統祭之而不用主此説是也却又云祖又豈可厭多苟其可知者無遠近多少須當盡祭之疑是初時未曾討論故有此説語類夫錄楊道問祭禮曰古禮難行且依温公擇其可行者行之祭土地只用韓公所編祇一位祭祖自髙祖而下如伊川所論古者祇祭考妣温公祭自曾祖而下伊川以髙祖有服所當祭今見於遺書者甚詳此古禮所無創自伊川所以使人盡孝敬追遠之義語類錄楊驤大宗法既立不得亦當立小宗法祭自髙祖以下親盡當請出髙祖就叔伯位服未盡者祭之語類錄包揚問有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者曰此説公子之宗也謂如人君有三子一嫡而二庶則庶宗其嫡是謂有大宗而無小宗皆庶則宗其庶長是謂有小宗而無大宗止有一人則無人宗之已亦無所宗焉是謂無宗亦莫之宗也下云公子之公為其士大夫之庶者宗其士大夫之嫡者此正解有大宗而無小宗一句之公之公猶君也語類萬人傑錄問禮曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗竊謂君適長為世子繼先君正統自母弟以下皆不得宗其次適為别子不得禰其父則不可宗嗣君又不可無統屬故立為先君之族大宗之祖所謂别子為祖也其適子繼之則為大宗凡先君所出之子孫皆宗之百世不遷故曰大宗者繼别子之所自出也吕氏言别子所自出者謂别子所出之先君也如魯李友乃桓公别子所自出故為桓公一族之大宗不知是否百世不遷者以其統先君之子孫而非統别之子孫也别子之庶長義不禰别子而自為五世小宗之祖其適子繼之則為小宗小宗者繼别子庶子之所自出也故惟及五世五世之外則無服蓋以其統别之子孫而非統先君之子孫也不知是否伏乞垂誨曰宗子有公子之宗有大宗有小宗國家之衆子不繼世者若其問有適子則衆兄弟宗之為大宗若皆庶子則兄弟宗其長者為小宗此所謂公子之宗者也别子即是此宗子既没之後其適長者各自繼此别子即是大宗直下相傳百世不遷别子之衆子既没之後其適長子又宗之即為繼禰之小宗每一易世髙祖廟毁則同此廟者是為袒免之親不復相宗矣所謂五世而遷也文集答董叔重凡文字有一兩本參對則義理自明如禮記中喪服小記喪服大傳都是解注儀禮喪服小記云庶子不祭禰明其宗也又曰庶子不祭祖明有宗也注謂不祭禰者父之庶子不祭祖者其父為庶子説得繁碎大傳只説庶子不祭則祖禰皆在其中矣某所以於禮書中只載大傳説語類錄沈僴父在主祭子出仕宦不得祭父没宗子主祭庶子出仕宦祭時其禮亦合減殺不得同宗子語類錄包揚所問祭禮古人雖有始祖亦只是祭於大宗之家若小宗則祭止髙祖而下然又有三廟二廟一廟祭寢之差其尊卑之殺極為詳悉非謂家家皆可祭始祖也今法制不立家自為俗此等事若未能遽變則且從俗可也支子之祭亦是如此竊謂只於宗子之家立主而祭其支子則只用牌子其形如木主而不判前後不為陷中及兩竅不為櫝以從降殺之義不知如何可更商量也文集立之答潘某承詢及影堂按古禮廟無二主嘗原其意以為祖考之精神既散欲其萃聚於此故不可以二今有祠版又有影是有二主矣古人宗子承家主祭仕不出鄉故廟無虚主而祭必於廟惟宗子越在他國則不得祭而庶子居者代之祝曰孝子某宗子名使介子某庶子名執其常事然猶不敢入廟特望墓為壇以祭蓋其尊祖敬宗之嚴如此今人主祭者遊宦四方或貴仕於朝又非古人越在他國之比則以其田祿修其薦享尤不可闕不得以身去國而使支子代之也禮意終始全不相似泥古則濶於事情徇俗則無復品節必欲酌其中制適古今之宜則宗子所在奉二主以從之於事為宜蓋上不失萃聚祖考精神之義二主常相依則精神不分矣下使宗子得以田祿薦享祖宗宜亦歆之處禮之變而不失其中所謂禮雖先王未之有可以義起者蓋如此但支子所得自主之祭則當留以奉祀不得隨宗子而徙也所諭留影於家奉祠版而行恐精神分散非鬼神所安而支子私祭上及髙曾又非所以嚴大宗之正也明則有禮樂幽則有鬼神其禮一致推此思之則知所處矣學絶道喪此語世所罕聞聞之必以為笑然以吾友下問之勤不敢不以正對侍次試以禀知更與圭甫熟講斷然行之一新弊俗共甫博學多聞亦不應以此為怪也更詳思之文集平甫答劉問先兄乃先人長子既娶而死念欲為之立後但説立後則必當使之主祭則某之髙祖亦當祧去否曰既更立主祭者即祠版亦當改題無疑髙祖祧去雖覺人情不安然别未有以處也家間將來小孫奉祀其勢亦當如此可更考之文集伯量答胡問夫主不可以二者也四明髙氏之説云耳煇詳此意謂有宗子之家主祭故庶子止以其牲祭於宗子之家可也是不可以有二主也今人若兄弟異居相去遼遠欲各祭其祖父亦謂不可以二主乎曰兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜向見説前輩有如此而相去遠者則兄家設主弟不立主只於祭時旋設位以紙榜標記逐位祭畢焚之如此似亦得禮之變也更詳之文集晦叔答李人家族衆不分合祭或主祭者不可以祭及叔伯之類則須令其嗣子别得祭之今且説同居同出於曾祖便有從兄弟及再從兄弟了祭時主於主祭者其他或子不得祭其父母若恁地滚做一處祭不得要好當主祭之嫡孫當一日祭其曾祖及祖及父餘子孫與祭次日却令次位子孫自祭其祖及父又次日却令又次位子孫自祭其祖及父此却有古宗法意古今祭禮這般處皆有之其後來更討得幾家要入未得如今要知宗法祭祀之禮須是在上之人先就宗室及世族家行了做箇樣子方可使以下士大夫行之語類孫錄葉賀問七十老而傳則嫡子嫡孫主祭如此則廟中神主都用改換作嫡子嫡孫名奉祀然父母猶在於心安乎曰然此等也難行也且得躬親耳又問嫡孫主祭則便須祧六世七世廟主自嫡孫言之則當祧若叔祖尚在則乃是祧其高曾祖於心安乎曰也只得如此聖人立法一定而不可易兼當時人習慣亦不以為異也又問先生舊時立春祭先祖冬至祭始祖後來廢之何故曰覺得忒煞過當和禘祫都包在裏面了恐太僭遂廢之語類錄沈僴問忌日當哭否曰若是哀來時自當哭又問衣服之制曰某自有弔服絹衫絹巾忌日則服之語類錄輔廣忌日祭只祭一位語類錄吕燾問君子有終身之喪忌日之謂也不知忌日合著如何服曰唐時士大夫依舊孝服受弔五代時某人忌日受弔某人弔之遂於坐間刺殺之後來只是受人慰書而不接見須隔日預辦下謝書俟有來慰者即以謝書授之不得過次日過次日謂之失禮服亦有數等考與祖曾祖髙祖各有降殺妣與祖妣服亦不同大㮣都是黲衫黲巾後來横渠制度又别以為男子重乎首女子重乎帶考之忌日則用白巾之類疑亦是黲巾而不易帶妣之忌日則易帶而不改巾服亦隨親疏有隆殺問先生忌日何服曰某只著白絹涼衫黲巾不能做許多樣服得問黲巾以何為之曰紗絹皆可某以紗又問誕辰亦受子弟壽酒否曰否衣服易否曰否一例不受人物事某家舊時常祭立春冬至季秋祭禰三祭後以立春冬至二祭近禘祫之祭覺得不安遂去之季秋依舊祭禰而用某生日祭之值某生日在季秋遂用此日九月十五日又問在官所還受人壽儀否曰否然也有行不得處如作州則可以不受蓋可以自由若有監司所在只得按例與之受蓋他生日時又用還他某在潭州如此在南康漳州不受亦不送又問黲巾之制曰如帕複相似有四隻帶若當幞頭然語類錄沈僴問時祭用仲月清明之類或是先世忌日則如之何曰却不思量到古人所以貴於卜日也語類錄王過家廟要就人住居神依人不可離外做廟又在外時婦女遇雨時難出入語類錄包揚先生云欲立一家廟小五架屋以後架作一長龕堂以板隔截作四龕堂堂置位牌堂外用簾子小小祭祀時亦可只就其處大祭祀則請出或堂或㕔上皆可語類錄包揚問先生家廟只在㕔事之側曰便是力不能辦古之家廟甚濶所謂寢不踰廟是也祭時移神主於正堂其位如何曰只是排列以西為上祫祭考妣之位如何曰太祖東向則昭穆之南向北向者以西方為上則昭之位次髙祖西而妣東祖西而妣東是祖母與孫竝列於體為順若余正父之説則欲髙祖東而妣西祖東而妣西則是祖與孫婦竝列於體為不順彼蓋據漢儀中有髙祖南向吕后少西更不取證於經文而獨取傳注中之一二執以為是斷不可回耳語類萬人傑錄問有田則祭無田則薦如何曰温公祭禮甚大今亦只是薦然古人薦用首月祭用仲月朝廷却用首月語類包揚錄朔旦家廟用酒果望旦用茶重午中元九日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦俗節酒止一上斟一盃語類錄包揚先生家祭享不用紙錢凡遇四仲時祭隔日滌椅桌嚴辦次日侵晨已行事畢語類錄王過叔器問行正禮則俗節之祭如何曰韓魏公處得好謂之節祠殺於正祭某家依而行之但七月十五素饌用浮屠某不用耳向南軒廢俗節之祭某問於端午能不食粽乎重陽能不飲茱萸酒乎不祭而自享於汝安乎語類錄陳淳墓祭非古雖周禮有墓人為尸之文或是初間祭后土亦未可知但今風俗皆然亦無大害國家不免亦十月上陵語類錄陳淳比見墓祭土神之禮全然滅裂吾甚懼焉既為先公託體山林而祀其主者豈可如此今後可與墓前一樣菜果胙脯飯茶湯各一器以盡吾寧親事神之意勿令其有隆殺文集書戒子祭説辨訂精審尤荷警發然此二事初亦致疑但見二先生皆有隨俗墓祭不害義理之説故不敢輕廢至於節祠則又有説蓋今之俗節古所無有故古人雖不祭而情亦自安今人既以此為重至於是日必具殽羞相宴樂而其節物亦各有宜故世俗之情至於是日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能已者但不當專用此而廢四時之正禮耳故前日之意以為既有正祭則存此似亦無害今承誨諭以為黷而不敬此誠中其病然欲遂廢之則恐感時觸物思慕之心又無以自止殊覺不易處且古人不祭則不敢以燕況今於此俗節既已據經而廢祭而生者則飲食燕樂隨俗自如殆非事死如事生事亡如事存之意也必盡廢之然後可又恐初無害於義理而特然廢之不惟徒駭俗聽若恐不能行遠則是已廢之祭拘於定制不復能舉而燕飲節物漸於流俗有時而自如也此於天理亦豈得為安乎夫三王制禮因革不同皆合乎風氣之宜而不違乎義理之正正使聖人復起其於今日之議亦必有所處矣愚意時祭之外各因鄉俗之舊以其所尚之時所用之物奉以大槃陳於廟中而以告朔之禮奠焉則庶幾合乎隆殺之節而盡乎委曲之情可行於久遠而無疑矣至於元日履端之祭禮亦無文今亦只用此例又初定儀時祭用分至則冬至二祭相仍亦近煩凟今改用卜日之制尤見聽命於神不敢自專之意其他如此修定處甚多大抵多本程氏而參以諸家故特取二先生説今所承用者為祭説一篇而祭儀祝文又各為一篇比之昨本稍復精密繕冩上呈乞賜審訂示及幸甚文集敬夫答張焚黄近世行之墓次不知於禮何據昨見敬夫謝魏公贈諡文字却只云告廟此與近世所行又不知孰為得失也更乞台諭幸甚文集尚書答汪問生時男女異席祭祀亦合異席今夫婦同席如何曰夫婦同牢而食語類蔚錄陳文家廟之制伊川只以元妃配享蓋古者只是以媵妾繼室故不容與嫡竝配後世繼室乃是以禮聘娶自得為正故唐會要中載顔魯公家祭有竝配之儀語類呉必大錄古人無再娶之禮娶時便有一副當人了嫡庶之分定矣故繼室於正室不可竝配今人雖再娶然皆以禮聘皆正室也祭於别室恐未安如伊川云奉祀之人是再娶所生則以所生母配如此則是嫡母不得祭矣此尤恐未安大抵伊川考禮文却不似横渠考得較仔細語類羽錄章伯問禮云父不祭子夫不祭妻何也曰便是此一説被人解得都無理會了據某所見此二句承上面餕餘不祭説蓋謂餕餘之物雖父不可將去祭子夫不可將去祭妻且如孔子君賜食必正席先嘗之君賜腥必熟而薦之君賜腥則非餕餘矣雖熟之以薦先祖可也賜食則或為餕餘但可正席先嘗而已固是不可祭先祖雖妻子至卑亦不可祭也語類蔚錄陳文夫祭妻亦當拜語類剛錄黄義妣者嫓也祭所生母只當稱母則畧有别語類錄劉砥問子之所生母死不知題主當何稱祭於何所祔於何所曰今法五服年月篇中母字下注云謂生己者則但謂之母矣若避嫡母則止稱亡母而不稱妣以别之可也伊川先生云祭於私室又問禮記曰妾母不世祭於子祭於孫止又曰妾祔于妾祖姑既不世祭至後日子孫有妾母又安有妾祖姑之可祔耶不知合祭幾世而止曰此條未詳舊讀禮亦每疑之俟更詢考也又問妾母若世祭其孫異日祭妾祖母宜何稱自稱云何曰世祭與否未可知若祭則稱之為祖母而自稱孫無疑矣文集文卿答竇問妾母之稱曰恐也只得稱母他無可稱在經只得云妾母不然無以别於他母也又問弔人妾母之死合稱云何曰恐也只得隨其子平日所稱而稱之或曰五峯稱妾母為少母南軒亦然據爾雅亦有少姑之文五峯想是本此先生又曰為人後者為其父母服本朝濮王之議欲加皇考字引此為證當時雖是衆人爭得住然至今士大夫猶以為未然蓋不知禮經中若不稱作為父母别無箇稱呼只得如此説也語類沈僴錄用之問祭用尸之意曰古人祭祀無不用尸非惟祭祀家先用尸祭外神亦用尸不知祭天地如何想惟此不敢為尸杜佑説古人用尸者蓋上古朴陋之禮至聖人時尚未改文蔚錄云是上古朴野之俗先王制禮是去不盡者相承用之至今世則風氣日開朴陋之禮已去不可復用去之方為禮而世之迂儒必欲復尸可謂愚矣杜佑之説如此今蠻夷猺洞中有尸之遺意每遇祭祀鬼神時必請鄉之魁梧姿美者為尸而一鄉之人相率以拜祭為之尸者語話醉飽每遇歲時為尸者必連日醉飽此皆古之遺意嘗見崇安余宰邵武人説他之鄉里有一村名密溪去邵武數十里此村中有數十家事所謂中王之神甚謹所謂中王者每歲以序輪一家之長一人為中王周而復始凡祭祀祈禱必請中王坐而祠之歲終則一鄉之父老合樂置酒請新舊中王者講交代之禮此人既為中王則一歲家居寡出恭謹畏慎畧不敢為非以副一村祈向之意若此村或有水旱災沴則人皆歸咎於中王以不善為中王之所致此等意思皆古之遺聞近來數年此禮已廢矣㸔來古人用尸自有深意非朴陋也陳丈云蓋不敢死其親之意曰然用之云祭祀之禮酒肴豐潔必誠必敬所以望神之降臨乃歆饗其飲食也若立之尸則為尸者既已享其飲食鬼神豈復來享之如此却為不誠矣曰此所以為盡其誠也蓋子孫既是祖宗相傳一氣下來氣類固已感格而其語言飲食若其祖考之在焉則有以慰其孝子順孫之思而非恍惚無形想像不及之可比矣古人用尸之意所以深遠而盡誠蓋為是耳今人祭祀但能盡誠其祖考猶來格況既是他親子孫則其來格也益速矣因言今世鬼神之附著生人而説話者甚多亦有祖先降神於其子孫者又如今之師巫亦有降神者蓋皆其氣類之相感所以神附著之也周禮祭墓則以墓人為尸亦是此意語類䝉錄林子問祭五祀皆有尸祀竈則以誰為尸曰今亦無可考者但如墓祭則以冢人為尸以此推之則祀竈之尸恐是膳夫之類祀門之尸恐是閽人之類又如祀山川則是虞衡之類問尸之坐立曰夏立尸商坐尸周旅酬六尸后稷之尸不旅酬問祭妣之尸曰婦人不立尸却有明文又曰古者以先王衣服藏之廟中臨祭則出以衣尸如后稷之衣到周時恐已不在亦不可曉語類用錄李儒朱子禮纂卷四
